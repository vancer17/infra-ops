# =============================================================================
# Ansible Inventory 变量：Dev 业务网关 Compose（Nginx + LE DNS-01）
# =============================================================================
#
# 【这个文件是什么】
#   dev-01 上 dev-gateway Compose 栈的 SSOT，供 gateway-compose.yml /
#   roles/gateway_compose 消费。与宿主机 Ansible Nginx（nginx-dev.yml）互斥。
#
# 【部署模型】
#   自定义网关镜像使用本地名 infra-ops/<name>:<tag>，不向轩辕等镜像加速站 push。
#   轩辕（5yrqsf19ms2mh4.xuanyuan.run）仅用于拉取公网基础镜像（见 bootstrap docker mirror），
#   不能作为 infra-ops 自建镜像的私有仓库。
#
#   delivery=local  → 在目标机 make build-gateway-images 后 Ansible compose up
#   delivery=bundle → 控制机 build+save，Ansible 同步 tar 并 docker load
#   delivery=registry → 真实私有仓库（阿里云 ACR 等）pull；填 registry_url
#
# 【推荐顺序】
#   dev-app.yml → gateway-compose.yml（停用宿主机 nginx，启动 dev-gateway 栈）
#
# 【业务路径隔离】
#   device_management 定义设备管理系统在业务面 Nginx 上的独立路径前缀：
#     - /device-management/       → 前端静态文件
#     - /device-management/api/*   → 127.0.0.1:18080/api/*
#     - /device-management/healthz → 127.0.0.1:18080/healthz
#   该配置不改变后端监听端口，不占用根路径 /，并与 Hub 管理面 Nginx 分离。
#
# =============================================================================

---

gateway:
  enabled: true

  # not_started → 待 gateway-compose.yml apply；operational → Compose 网关已接管 80/443/8883
  status: operational
  operational_at: "2026-06-17"
  mqtt_tls_operational_at: "2026-06-22"
  acceptance_ref: docs/acceptance/20260617-阶段4-Dev-Gateway-Compose-LE验收.md
  mqtt_acceptance_ref: docs/acceptance/20260622-阶段J-Dev-MQTT-MQTTS与域名迁移验收.md
  # 实机 Ansible SSOT：/opt/gateway/compose；手工调试可并用 ~/infra-ops/docker/dev-gateway
  deploy_note: "Ansible @ /opt/gateway/compose；阶段 J：yizuxing 域名 + MQTTS 8883；镜像 1.0.3（含 device-management 路径隔离）"

  # ---------------------------------------------------------------------------
  # compose — 仅同步项目目录；不在目标机 docker build
  # ---------------------------------------------------------------------------
  compose:
    project_dir: /opt/gateway/compose
    project_name: dev-gateway
    sync_mode: project_only
    sync_delete: true
    build: never
    # certbot-internal 子网（与 docker/dev-gateway/docker-compose.yml ipam 一致）
    # 不得落在 VPC 172.20（RDS）/ 172.21（ECS）段
    certbot_internal_subnet: "172.30.0.0/24"
  # pull 由 images.delivery 决定：registry→always，local/bundle→missing

  # ---------------------------------------------------------------------------
  # images — 本地命名空间 + 分发方式（scripts/docker/build-gateway-images.sh）
  # 完整引用：{{ namespace }}/{{ name }}:{{ tag }}，例如 infra-ops/certbot-init:1.0.2
  # ---------------------------------------------------------------------------
  images:
    namespace: infra-ops
    tag: "1.0.3"
    certbot_init: certbot-init
    certbot_renew: certbot-renew
    nginx: dev-nginx
    # local | bundle | registry
    delivery: local
    # delivery=bundle 时由 build-gateway-images.sh save 生成，Ansible 同步到目标机 load
    bundle_filename: infra-ops-gateway-1.0.3.tar
    # delivery=registry 时填写真实仓库（非轩辕加速），示例：
    # registry_url: registry.cn-hangzhou.aliyuncs.com/your-namespace
    registry_url: ""

  # ---------------------------------------------------------------------------
  # certbot — DNS-01（阿里云 DNS API）
  # ---------------------------------------------------------------------------
  certbot:
    email: "you@example.com"
    # 空格分隔；含 mqtt 子域以便一张 LE 证覆盖 API + MQTTS
    domains: "backend.yizuxing.com mqtt.yizuxing.com"
    primary_domain: backend.yizuxing.com
    staging: false
    force_issue: false
    propagation_seconds: 90
    rsa_key_size: 4096
    renew_interval_seconds: 43200
    wait_for_cert_sec: 900

  # ---------------------------------------------------------------------------
  # nginx — Compose 容器内 Nginx（host 网络）
  # ---------------------------------------------------------------------------
  nginx:
    server_names: "backend.yizuxing.com 121.41.58.20"
    internal_server_names: "dev-app.internal 10.200.0.2"

  # ---------------------------------------------------------------------------
  # mqtt — 公网 MQTTS（Nginx stream 8883 → 127.0.0.1:1883），不暴露明文 1883
  # ---------------------------------------------------------------------------
  mqtt:
    enabled: true
    tls_domain: mqtt.yizuxing.com
    tls_port: 8883
    # 与 certbot.primary_domain 同证时复用 live/backend.../fullchain.pem
    tls_cert_domain: backend.yizuxing.com
    upstream_host: "127.0.0.1"
    upstream_port: 1883

  # ---------------------------------------------------------------------------
  # upstream — 反代宿主机应用（与 app.listen 对齐）
  # ---------------------------------------------------------------------------
  upstream:
    host: "127.0.0.1"
    port: 8080

  # ---------------------------------------------------------------------------
  # device_management — device-management-system 路径隔离入口
  # ---------------------------------------------------------------------------
  device_management:
    service_prefix: /device-management
    upstream_host: "127.0.0.1"
    upstream_port: 18080
    frontend_host_dir: /home/deploy/device-management-system/frontend
    frontend_web_root: /srv/www

  # ---------------------------------------------------------------------------
  # network — Docker 网段须避开 VPC（RDS 172.20.x、ECS 172.21.x）
  # compose 中 certbot-internal 已钉死 172.30.0.0/24；与 docker daemon 地址池一致
  # ---------------------------------------------------------------------------
  network:
    certbot_internal_subnet: "172.30.0.0/24"
    reserved_vpc_subnets:
      - "172.20.0.0/16"
      - "172.21.0.0/16"

  # ---------------------------------------------------------------------------
  # host_nginx — 割接时停用 systemd nginx，释放 80/443
  # ---------------------------------------------------------------------------
  host_nginx:
    disable_service: true
    package_name: nginx

  # ---------------------------------------------------------------------------
  # health — apply 后验收
  # ---------------------------------------------------------------------------
  health:
    public_https_url: "https://backend.yizuxing.com/healthz"
    public_https_url_nginx: "https://backend.yizuxing.com/health"
    public_mqtt_tls_host: mqtt.yizuxing.com
    public_mqtt_tls_port: 8883
    validate_certs: true
    expect_status: 200
    delay: 10
    compose_up_buffer_sec: 180
