# =============================================================================
# Ansible Inventory 变量文件：Dev 环境「全局通用」配置
# =============================================================================
#
# 【这个文件是什么】
#   group_vars/all/ 下的 main.yml，表示 inventory 中**所有 Dev 主机**（dev-01、
#   dev-02…）都会自动加载的**环境级公共变量**。
#
# 【与同目录其他文件的分工】
#   main.yml           → 本文件：环境标识、时区/语言、OSS 等非敏感「全环境常量」
#   bootstrap.yml      → 1.2 Bootstrap 专用（用户、Docker 开关、SSH 阶段等）
#   network.yml        → 网络拓扑、RDS、跨 VPC、安全组白名单引用 IP 等
#   app.yml            → 应用/占位 API、Compose 路径、客户端类型文档化
#   nginx.yml          → dev-01 业务 Nginx 网关（与 Hub mgmt nginx 分离）
#   secrets.yml        → ansible-vault 加密的 DB 密码等（仅 secrets.yml.example 进 Git）
#   ssh.yml            → SSH 密钥与连接用户
#
#   Ansible 按文件名字母序合并 group_vars/all/*.yml：
#     app → bootstrap → main → network → nginx → secrets → ssh
#   另有 group_vars/dev_app/main.yml、host_vars/<host>.yml
#
# 【谁在消费这些变量】
#   timezone、locale  → roles/common/tasks/base.yml（装系统时区与 locale）
#   env_name          → 预留：后续 app_deploy role / .env.j2 模板标记环境
#   network_phase     → 预留：与 network.yml 中 ci_connectivity 配合，标记阶段
#   oss.bucket/prefix → 应用 .env（独立 Dev 桶 infra-dev-file-storage；桶级隔离，无 dev/ 前缀）
#
# 【与 Test/Prod 的扩展方式】
#   Test 环境复制 inventories/test/group_vars/all/main.yml，仅改：
#     env_name: test
#     network_phase: bootstrap | wireguard | ...
#     oss.prefix: test
#   键名保持一致、只改值 —— 这是多环境 inventory 的标准做法。
#
# =============================================================================

---

# -----------------------------------------------------------------------------
# env_name — 逻辑环境名
# -----------------------------------------------------------------------------
# 类型：字符串
# 当前值：dev
# 用途：
#   - 在 playbook、模板、日志中区分 dev / test / prod，避免误操作生产资源
#   - 后续 app_deploy role 生成 /opt/app/compose/.env 时可写入 ENV=development
#     （或与 env_name 映射：dev → development）
# 注意：改此值不会自动改阿里云资源；RDS/OSS 实际隔离仍靠 network.yml 与云控制台配置
env_name: dev

# -----------------------------------------------------------------------------
# network_phase — 网络建设阶段标记
# -----------------------------------------------------------------------------
# 类型：字符串枚举（项目约定，非 Ansible 内置）
# 当前值：wireguard
# 含义：
#   bootstrap  → 1.1～1.2：公网 SSH 白名单、临时安全组（见 network.yml same_vpc_as_dev）
#   wireguard  → F2-5：Hub↔ci-01 operational；mgmt Hub 经 10.200.0.1，dev 仍用 VPC 私网
#   steady     → 运维收口完成（JumpServer、关公网 SSH 等）
# 当前 playbook 未直接用 when: network_phase == 'bootstrap' 过滤任务；
# 主要供人工/脚本判断，以及将来在 playbook 里写阶段条件，例如：
#   when: network_phase == 'wireguard'
network_phase: wireguard

# -----------------------------------------------------------------------------
# timezone — 系统时区
# -----------------------------------------------------------------------------
# 类型：字符串（IANA 时区名，如 Asia/Shanghai、UTC）
# 消费者：roles/common/tasks/base.yml
#   community.general.timezone:
#     name: "{{ timezone }}"
# 执行效果：timedatectl set-timezone Asia/Shanghai（幂等）
# 与验收脚本 scripts/dev/bootstrap.sh verify 中
#   timedatectl | grep 'Time zone: Asia/Shanghai' 对应
timezone: Asia/Shanghai

# -----------------------------------------------------------------------------
# locale — 系统区域/字符集
# -----------------------------------------------------------------------------
# 类型：字符串（locale 名，格式 language_COUNTRY.UTF-8）
# 消费者：roles/common/tasks/base.yml
#   community.general.locale_gen:
#     name: "{{ locale }}"
# 依赖：bootstrap.yml 中 bootstrap_base_packages 含 locales 包，否则 locale_gen 可能失败
# en_US.UTF-8：英文界面 + UTF-8，与 RDS utf8mb4、应用 UTF-8 一致；团队若需中文可改 zh_CN.UTF-8
locale: en_US.UTF-8

# -----------------------------------------------------------------------------
# oss — 阿里云对象存储（Dev 环境）
# -----------------------------------------------------------------------------
# 类型：嵌套字典
# 结构：
#   oss.bucket  → Dev 专用 Bucket（与生产 yzx-file-storage 隔离）
#   oss.prefix  → 对象键可选逻辑前缀；独立 Dev 桶时通常留空，应用自行规划 uploads/ 等
#
# 对应资产：
#   docs/assets/dev-01.yaml → dependencies.oss.dev_bucket
#   docs/assets/registry.yaml → shared_cloud_dependencies.oss.dev_bucket
#
# 访问方式：
#   ECS 绑定 RAM 角色 Dev-ECS-Role + 自定义策略 DevOssInfraDevFileStorageOnly
#
# 后续消费者（app_deploy role）：
#   .env.j2 模板：
#     OSS_BUCKET={{ oss.bucket }}
#     OSS_PREFIX=（prefix 为空时不追加 dev/）
# 引用语法：oss.bucket、oss.prefix（点号访问嵌套键）
oss:
  bucket: infra-dev-file-storage
  prefix: ""
