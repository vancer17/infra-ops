# =============================================================================
# Ansible Inventory 变量文件：Dev 环境网络与连通性配置
# =============================================================================
#
# 【这个文件是什么】
#   group_vars/all 下的组变量，对 inventory 中所有 Dev 主机（dev-01、dev-02）生效。
#   集中定义：IP 地址台账、CI 与 Dev 如何连通、安全组/RDS 白名单引用、
#   应用端口、主机防火墙策略、RDS 连接信息。
#
# 【与 docs/assets/ 的关系（2026-06-08 资产台账修订）】
#   人工台账权威来源：docs/assets/registry.yaml + docs/assets/<host>.yaml
#   本文件是 Ansible 运行时的机器可读 SSOT，字段须与资产台账保持一致。
#   修订流程：先改 docs/assets/ → 再同步本文件 → make inventory
#
# 【2026-06-08 网络事实变更】
#   1. 原 CI 机 47.98.161.33 不可用 → 由 121.41.58.20（ci-01 / dev-01 同机）替代
#   2. 原 Dev-02 121.40.245.68 不可用 → 由 112.124.104.223（dev-02 替代）承接
#   3. 当前 4 台可用 ECS 均在同一 VPC vpc-bp1jmugctnhj97dbjyx31
#      → same_vpc_as_dev: true，Ansible 优先使用 private_ip（ansible_host_internal）
#   4. WireGuard ci-01↔Hub operational（F2）；F2-5 后 ci_access_mode: wireguard
#      dev-01 与 ci-01 同 ECS → ansible_host 仍用 VPC 私网；Hub 经 WG（mgmt inventory）
#   5. RDS Dev 库 app_dev（方案 A）已于 2026-06-15 验收；rds.host 使用内网域名（见 §rds）
#   6. Redis 云实例 r-bp10kgwdml4kqgssoz 已于 2026-06-22 验收；redis.host 使用内网域名（见 §redis）
#
# 【ansible_host 计算逻辑】
#   见 host_vars/dev-*.yml：
#     当 same_vpc_as_dev=true 且 private_ip、ansible_host_internal 均有值
#       → 使用 ansible_host_internal（VPC 私网）
#     否则
#       → 使用 ansible_host_from_ci（通常为 public_ip）
#   dev-01 与 ci-01 同 ECS：即使 ci_access_mode=wireguard，dev-01 仍用私网（非 wg_ip）
#   连 Hub 走 mgmt inventory（10.200.0.1）；dev-02 未装 WG Client 前仍用 VPC 私网
#
# =============================================================================

---

# -----------------------------------------------------------------------------
# security_whitelist — 允许访问 Dev ECS 的来源 IP（与安全组入站规则对应）
# -----------------------------------------------------------------------------
# 2026-06-08：ci_public_ip 从已退役的 47.98.161.33 改为 CI 替代机 121.41.58.20
# 修改后须同步 docs/security-groups/dev-ecs-bootstrap.rules.yaml
security_whitelist:
  ci_public_ip: "121.41.58.20/32"
  ci_public_ip_legacy: "47.98.161.33/32"
  ci_public_ip_legacy_status: retired
  office_egress_ips:
    - "115.195.216.251/32"
  wireguard_cidr_future: "10.200.0.0/16"

# -----------------------------------------------------------------------------
# rds_whitelist — RDS 实例 IP 白名单（RDS 控制台配置，非 ECS 安全组）
# -----------------------------------------------------------------------------
# 规则：只加 ECS 私网 IP；dev-02 替代机已登记，Bootstrap 后确认连通性
rds_whitelist:
  group_name: dev-ecs
  entries:
    - host: dev-01
      ip: "172.21.226.38/32"
      status: confirmed
      confirmed_at: "2026-06-15"
      note: "ci-01/dev-01 同机；nc + mysql 验收通过"
    - host: dev-02
      ip: "172.21.127.124/32"
      status: pending_bootstrap

# -----------------------------------------------------------------------------
# ci_connectivity — 控制机（CI）到 Dev 的网络关系
# -----------------------------------------------------------------------------
# same_vpc_as_dev: true
#   当前 CI 替代机（121.41.58.20）与 dev-01 同 ECS，与 dev-02 同 VPC
#   → inventory-check 允许 ansible_host 为 172.x 私网地址
#
# ci_access_mode: wireguard
#   Hub Ansible 经 10.200.0.1；dev-01 同机仍用私网；dev-02 仍用 VPC 私网（未装 WG Client）
#
# ci_substitute：文档化字段，供 playbook/runbook 读取，不参与 ansible_host 计算
ci_connectivity:
  same_vpc_as_dev: true
  ci_access_mode: wireguard
  ci_substitute:
    planned_public_ip: "47.98.161.33"
    current_public_ip: "121.41.58.20"
    current_host: ci-01
    colocated_with_dev: dev-01

# -----------------------------------------------------------------------------
# platform_hosts — 管理面节点（非 dev inventory 成员，供文档与后续 mgmt playbook）
# -----------------------------------------------------------------------------
# 与 dev_hosts 分离：hub-01、ci-01 不由 dev-01/dev-02 playbook 的 hosts: dev 管理
# 字段结构与 dev_hosts 一致，便于将来 inventories/mgmt/ 复制
platform_hosts:
  hub-01:
    public_ip: "121.43.49.58"
    private_ip: "172.21.127.123"
    wg_ip: "10.200.0.1"
    role: hub
    instance_id: "i-bp13u0d90uicmwrh4kb"
    replaces_planned_ip: "47.97.19.58"
    wireguard_server: true
    bootstrap_status: ssh_done
    wireguard_status: operational
  ci-01:
    public_ip: "121.41.58.20"
    private_ip: "172.21.226.38"
    wg_ip: "10.200.0.2"
    role: ci
    instance_id: "i-bp14czvx1exdi6cmrt2r"
    replaces_planned_ip: "47.98.161.33"
    same_ecs_as: dev-01
    wireguard_status: operational
    wireguard_client_installed_at: "2026-06-14"

# -----------------------------------------------------------------------------
# dev_hosts — Dev inventory 主机的网络台账（与 docs/assets/dev-*.yaml 对齐）
# -----------------------------------------------------------------------------
dev_hosts:
  dev-01:
    public_ip: "121.41.58.20"
    private_ip: "172.21.226.38"
    # 逻辑规划段 Dev 地址；实机 WG 流量经 ci-01 同机 Peer 10.200.0.2（见 app.domains.wg_ip）
    wg_ip: "10.200.1.1"
    hub_peer_wg_ip: "10.200.0.2"
    role: dev_app
    instance_id: "i-bp14czvx1exdi6cmrt2r"
    # 跨 VPC 回退地址；同 VPC 时 host_vars 优先 internal
    ansible_host_from_ci: "121.41.58.20"
    ansible_host_internal: "172.21.226.38"
    same_ecs_as_ci: true
    bootstrap_status: bootstrap_done
    # 业务网关（2026-06-17 Compose LE 验收）；应用 PetIntelli operational
    nginx_app_status: operational
    nginx_runtime: compose
    gateway_compose_status: operational
    app_deploy_status: operational
  dev-02:
    public_ip: "112.124.104.223"
    private_ip: "172.21.127.124"
    wg_ip: "10.200.1.2"
    role: dev_worker
    instance_id: "i-bp17nu3p75waikdaquwr"
    replaces_planned_public_ip: "121.40.245.68"
    ansible_host_from_ci: "112.124.104.223"
    ansible_host_internal: "172.21.127.124"
    bootstrap_status: pending

# -----------------------------------------------------------------------------
# optional_hosts — 本期不纳入 dev inventory，仅作文档化（Test 等）
# -----------------------------------------------------------------------------
optional_hosts:
  test-01:
    public_ip: "116.62.228.105"
    private_ip: "172.21.127.122"
    wg_ip: "10.200.2.1"
    role: test_app
    instance_id: "i-bp1bs8vdr9ta7wi5kfgq"

# -----------------------------------------------------------------------------
# app_ports — Dev 环境应用监听端口
# -----------------------------------------------------------------------------
# 消费者：nginx.yml listen/upstream、app.yml placeholder.listen_port、安全组文档
# 8080 仅本机回环；公网由 Nginx 80/443 承接（见 remark.log IN-*-PUBLIC-DEV）
app_ports:
  http: 80
  https: 443
  app: 8080
  mqtt_tls: 8883

# -----------------------------------------------------------------------------
# security_group_ingress — Dev ECS 入站摘要（与控制台 remark.log 对齐，Ansible 不改云）
# -----------------------------------------------------------------------------
security_group_ingress:
  security_group_id: sg-bp122tjy3h95um8kv4f9
  summary_ref: logs/remark.log
  rules:
    - id: IN-HTTP-WG
      protocol: tcp
      port: 80
      source: "10.200.0.0/16"
    - id: IN-HTTPS-WG
      protocol: tcp
      port: 443
      source: "10.200.0.0/16"
    - id: IN-HTTPS-PUBLIC-DEV
      protocol: tcp
      port: 443
      source: "0.0.0.0/0"
      note: "小程序 / 外网 HTTPS API"
    - id: IN-HTTP-PUBLIC-DEV
      protocol: tcp
      port: 80
      source: "0.0.0.0/0"
      note: "可 301 至 443"
    - id: IN-MQTT-TLS-PUBLIC-DEV
      protocol: tcp
      port: 8883
      source: "0.0.0.0/0"
      note: "MQTTS；Nginx stream TLS 终止 → 127.0.0.1:1883"
  not_exposed:
    - port: 8080
      note: "应用容器仅 127.0.0.1，由 Nginx 反代"
    - port: 1883
      note: "MQTT 明文仅本机回环；公网使用 8883 MQTTS"

# -----------------------------------------------------------------------------
# host_firewall — 目标机 ufw 策略（Bootstrap 期不启用）
# -----------------------------------------------------------------------------
host_firewall:
  enabled: false
  note: "阶段 5 可评估是否启用 ufw"

host_firewall_ufw_enabled: "{{ host_firewall.enabled }}"

# -----------------------------------------------------------------------------
# docker_bridge — Docker 自定义 bridge 须避开的 VPC 网段（dev-01 连 RDS 路由冲突）
# -----------------------------------------------------------------------------
# 若 Docker 自动分到 172.20.0.0/16，宿主机访问 RDS(172.20.211.167) 会走 docker 网桥而失败。
# 缓解：gateway compose certbot-internal 显式子网 + docker daemon default-address-pools
docker_vpc_reserved_subnets:
  - cidr: "172.20.0.0/16"
    use: rds_private
  - cidr: "172.21.0.0/16"
    use: ecs_vpc

# -----------------------------------------------------------------------------
# rds — 应用连接 RDS 的业务参数（2026-06-15 方案 A 验收后）
# -----------------------------------------------------------------------------
# host：内网连接地址（无 no 后缀）；bootstrap verify 与应用 DSN 均使用此域名
# 外网地址 rm-bp1wjjf373l7t331vno.mysql.rds.aliyuncs.com 仅救急，见 docs/rds/
# 密码：GitHub Secret DB_PASSWORD 或 ansible-vault secrets.yml，不进 Git 明文
rds:
  host: "rm-bp1wjjf373l7t331v.mysql.rds.aliyuncs.com"
  port: 3306
  database: app_dev
  user: app_dev
  engine_version: "8.0.28"
  strategy: app_dev_new
  status: operational
  accepted_at: "2026-06-15"

# -----------------------------------------------------------------------------
# redis_whitelist — Redis 实例 IP 白名单（Redis 控制台配置，非 ECS 安全组）
# -----------------------------------------------------------------------------
# 规则：只加 ECS 私网 IP；与 RDS 白名单策略相同，不加 WG / 公网
# 权威文档：docs/redis/20260622-Redis-实例现状与Dev规划.md
redis_whitelist:
  group_name: dev-ecs
  instance_id: r-bp10kgwdml4kqgssoz
  entries:
    - host: dev-01
      ip: "172.21.226.38/32"
      status: confirmed
      confirmed_at: "2026-06-22"
      note: "ci-01/dev-01 同机；nc + redis-cli 验收通过"
    - host: dev-02
      ip: "172.21.127.124/32"
      status: pending_bootstrap

# -----------------------------------------------------------------------------
# redis — 应用连接 Redis 的业务参数（2026-06-22 阶段 I 验收后）
# -----------------------------------------------------------------------------
# host：内网连接地址；应用与 redis-cli 均使用此域名
# 密码：GitHub Secret REDIS_PASSWORD 或 ansible-vault app_secrets.redis_password
# 部署变更：由原 dev-02 Docker Redis 改为云托管实例（见 docs/redis/）
redis:
  host: "r-bp10kgwdml4kqgssoz.redis.rds.aliyuncs.com"
  port: 6379
  user: petintelli_app
  database: 0
  key_prefix: "petintelli:app:"
  engine_version: "7.0.15"
  architecture: standard
  product: community
  instance_id: r-bp10kgwdml4kqgssoz
  private_ip_resolved: "172.23.160.90"
  strategy: cloud_managed_single_account
  status: operational
  accepted_at: "2026-06-22"
  acceptance_ref: docs/acceptance/20260622-阶段I-Dev-Redis验收.md
