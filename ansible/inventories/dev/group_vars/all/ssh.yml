# =============================================================================
# Ansible Inventory 变量：Dev 环境 SSH 密钥体系（阶段 1.3）
# =============================================================================
#
# 【职责】
#   - CI/Ansible 连接 Dev 的 deploy 用户公钥来源
#   - SSH 加固阶段（bootstrap → steady）
#   - inventory 连接用户切换（root → deploy）
#
# 【密钥文件】
#   私钥：ansible/keys/infra-ci-deploy        （gitignore，仅 CI 机本地 + GitHub Secret）
#   公钥：ansible/keys/infra-ci-deploy.pub    （可提交 Git，由 scripts/dev/ssh-keys.sh generate 生成）
#
# 【执行入口】
#   ./scripts/dev/ssh-keys.sh generate
#   ./scripts/dev/ssh-keys.sh all dev-01
#   ./scripts/dev/ssh-keys.sh steady dev-01
#
# 【阶段 B 完成态（2026-06-14）】
#   与 hub-01 共用 infra-ci-deploy；ci-01 与 dev-01 同 ECS，steady 后 Ansible 用 deploy。
#   控制面环境：scripts/dev/setup-control-plane-env.sh all
#
# =============================================================================

---

# CI 部署专用密钥（OpenSSH 注释，写入公钥末尾）
# 2026-06-08：CI 替代机 121.41.58.20（ci-01，与 dev-01 同 ECS）；原 47.98.161.33 已退役
ssh_ci_key_comment: "infra-ci-deploy@121.41.58.20"

# 公钥文件路径（相对 inventory_dir，供 playbook pre_task 读取）
ssh_ci_pubkey_file: "{{ inventory_dir }}/../../keys/infra-ci-deploy.pub"

# 私钥路径（仅 scripts/dev/ssh-keys.sh 本地使用，Ansible 不读取）
ssh_ci_private_key_file: "{{ inventory_dir }}/../../keys/infra-ci-deploy"

# 额外公钥（如个人应急密钥）；与文件公钥合并后写入 deploy authorized_keys
deploy_authorized_keys_extra: []

# Ansible 连接用户（steady 后固定 deploy）
ssh_inventory_user: deploy

# 默认空列表；1.3 由 infra-ci-deploy.pub 或 playbook 注入
deploy_authorized_keys: []

# SSH 加固阶段，见 roles/common/templates/sshd-dev-bootstrap.conf.j2
ssh_phase: steady

# 1.3 完成（与 hub-01 mgmt/ssh.yml 对齐）
ssh_keys_configured: true

# GitHub Actions deploy.yml 使用的 Secret 名称（文档化，非 Ansible 变量消费）
github_secrets:
  ansible_ssh_private_key: ANSIBLE_SSH_PRIVATE_KEY
  ansible_ssh_known_hosts: ANSIBLE_SSH_KNOWN_HOSTS
  ansible_vault_password: ANSIBLE_VAULT_PASSWORD
