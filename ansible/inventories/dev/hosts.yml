---
# =============================================================================
# Ansible Inventory：Dev 环境主机分组
# =============================================================================
#
# dev_app    → dev-01：业务 Nginx（nginx.yml）+ 应用/占位 API（app.yml）
# dev_worker → dev-02：中间件 Worker
#
# 变量：group_vars/all/{app,bootstrap,main,network,nginx,ssh}.yml
#       group_vars/dev_app/main.yml、host_vars/<host>.yml
#
# =============================================================================

# CI 与 Dev 跨 VPC：ansible_host 见 host_vars/<host>.yml（由 network.dev_hosts 驱动）
all:
  children:
    dev:
      children:
        dev_app:
          hosts:
            dev-01:
        dev_worker:
          hosts:
            dev-02:
    jumpserver_assets:
      hosts:
        dev-01:
        dev-02:
