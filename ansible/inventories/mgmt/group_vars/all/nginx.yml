# =============================================================================
# Ansible Inventory 变量：Hub 管理面 Nginx 网关（阶段 G1）
# =============================================================================
#
# 【这个文件是什么】
#   Hub（hub-01）宿主机 Nginx 的配置 SSOT，供 nginx role 与 nginx-hub.yml 消费。
#
# 【与 wireguard 的关系】
#   访问路径：WG Client → 10.200.0.1:443 → Nginx → 本机 upstream（如 JumpServer）
#   安全组：IN-HTTPS-WG、IN-HTTP-WG（2026-06-15 G1 验收）
#
# 【状态】2026-06-15 G1 apply + 实机验收通过；2026-06-16 G2 JumpServer 维护页 + jms/status
#
# 【维护】变更 SAN 见 docs/nginx/hub-nginx.runbook.md「TLS 证书轮换」
#
# =============================================================================

---

nginx:
  enabled: true
  status: operational

  package_name: nginx
  remove_default_site: true

  health_uri: /health

  # JumpServer Docker 未部署前，upstream 未监听；Nginx 返回维护页（G2）而非裸 502
  jumpserver_upstream: "127.0.0.1:8080"

  jumpserver:
    # pending = 上游未就绪，展示维护页；ready = JumpServer 已监听 8080（G4 后改）
    deploy_status: pending
    # hub-g4-jumpserver.yml 成功后改为 ready 并提交 Git
    status_uri: /jms/status
    maintenance_enabled: true
    upstream_keepalive: 16
    proxy_read_timeout: 300s

  ssl:
    directory: /etc/nginx/ssl
    certificate_file: hub-internal.crt
    private_key_file: hub-internal.key
    self_signed: true
    days: 3650
    common_name: hub.internal
    subject_alt_names:
      - DNS:hub.internal
      - DNS:jms.internal
      - DNS:localhost
      - IP:10.200.0.1
    # 变更 SAN 后须删 Hub 上 hub-internal.{crt,key} 再 apply；见 docs/nginx/hub-nginx.runbook.md
