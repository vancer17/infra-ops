# =============================================================================
# Ansible Inventory 变量：WireGuard 隧道规划（阶段 F1 Hub Server 已部署）
# =============================================================================
#
# 【状态】
#   wireguard.status: operational — F1 Hub Server + F2 ci-01 Client 握手已完成（2026-06-14）
#   wireguard.enabled: true       — wireguard-hub.yml 已于 2026-06-14 apply 成功
#
# 【F2-5 收口（2026-06-14）】
#   ci_connectivity.access_mode: wireguard（network.yml）
#   network_phase: wireguard（main.yml / registry.yaml）
#   Ansible 连 Hub 使用 10.200.0.1；F2-5 已验收：logs/console-check.log
#
# 【与 wireguard_keys.yml / wireguard_vault.yml 分工】
#   本文件     → 地址、端口、Peer 公钥、Hub 公钥（可提交 Git）
#   vault 文件 → Hub 私钥密文
#   keys/      → *.pub 与 gitignore 的 *.private
#
# 【同机 ci-01 + dev-01（yax）Peer 模型 — 阶段 F 采用方案 A】
#   Hub wg0.conf 仅登记 ci-01 为 ECS Peer（10.200.0.2/32）。
#   dev-01 条目不生成 Hub [Peer]；dev-01.wg_ip 仅文档/未来拆分 ECS 时使用。
#   见 wireguard_peer_model 块。
#
# 【维护】
#   公钥变更：./scripts/wireguard/wg-keys.sh sync-inventory（保留本文件注释，勿手改公钥行）
#
# =============================================================================

---

# -----------------------------------------------------------------------------
# wireguard_peer_model — 同机多角色与 Hub [Peer] 登记策略（SSOT）
# -----------------------------------------------------------------------------
wireguard_peer_model:
  # single_peer_ci_01：yax 上仅一个 wg0 客户端，地址 10.200.0.2
  decision: single_peer_ci_01
  colocated_hosts: [ci-01, dev-01]
  # Hub Server 上登记的 Client Peer（有 public_key 的才会写入 wg0.conf）
  hub_active_peers:
    - ci-01
    - laptop-zhengyaoyuan
    - laptop-billmiao
    - laptop-sammao
    - laptop-zhu
    - laptop-xinxin
  # 仅 inventory/台账文档化，不在 Hub 上建 [Peer]
  hub_inactive_peers:
    - dev-01

# -----------------------------------------------------------------------------
# wireguard_client_pool — 人员 Client 网段与 AllowedIPs 配置档
# -----------------------------------------------------------------------------
# 台账 SSOT：docs/assets/wireguard-clients.yaml
wireguard_client_pool:
  cidr: "10.200.10.0/24"
  allowed_ips_dev: "10.200.0.0/24, 10.200.1.0/24, 10.200.2.0/24"
  allowed_ips_dev_ops: "10.200.0.0/16"

# -----------------------------------------------------------------------------
# wireguard — Server 接口参数
# -----------------------------------------------------------------------------
wireguard:
  # true = Hub 已安装 wg0（wireguard-hub.yml apply 完成）
  enabled: true

  interface: wg0

  # Hub Server 隧道地址（与 mgmt_hosts.hub-01.wg_ip 一致）
  hub_address: "10.200.0.1/24"

  # Hub 公钥（与 ansible/keys/wireguard/hub.pub 一致）
  hub_public_key: MNczHi1IQ4l8zkEPIQL1sPxSEPputkPdo2neaZWkFj8=

  listen_port: 51820

  ip_forward: true

  # not_started → keys_ready（E）→ server_up（F1）→ operational（F2 握手）
  status: operational

  keys_ready_at: "2026-06-14"
  server_up_at: "2026-06-14"
  operational_at: "2026-06-14"

# -----------------------------------------------------------------------------
# wireguard_peers_planned — Hub [Peer] 规划（公钥可提交 Git；私钥在 keys/*.private）
# -----------------------------------------------------------------------------
wireguard_peers_planned:
  - name: ci-01
    wg_ip: "10.200.0.2"
    public_key: X5SImX/WSFZeC5afnZSY2Q7DAYDp17CeRf/dX76jM0s=
    hub_peer: true
    allowed_ips: "10.200.0.0/16"
    persistent_keepalive: 25
    hub_peer_connected: true
    client_installed_at: "2026-06-14"
    note: "CI 控制机 + 与 dev-01 同 ECS；wireguard-peer.yml apply + handshake OK"

  - name: dev-01
    wg_ip: "10.200.1.1"
    public_key: null
    hub_peer: false
    note: "与 ci-01 同 ECS；不单独建 Hub [Peer]，见 wireguard_peer_model"

  - name: dev-02
    wg_ip: "10.200.1.2"
    public_key: null
    hub_peer: false
    note: "Dev-02 替代机 Bootstrap 后纳入；届时 hub_peer: true"

  - name: laptop-zhengyaoyuan
    wg_ip: "10.200.10.1"
    public_key: eQhU5QVENi3gPq4KxjFDqe/orLX75cs73aLOrSaRsnM=
    hub_peer: true
    member: zhengyaoyuan
    role: dev_ops
    allowed_ips_client: "{{ wireguard_client_pool.allowed_ips_dev_ops }}"
    persistent_keepalive: 25
    hub_peer_connected: true
    note: "开发/运维；原 developer-laptop 已更名；公钥 laptop-zhengyaoyuan.pub"

  - name: laptop-billmiao
    wg_ip: "10.200.10.2"
    public_key: null
    hub_peer: true
    member: billmiao
    role: dev
    allowed_ips_client: "{{ wireguard_client_pool.allowed_ips_dev }}"
    persistent_keepalive: 25
    note: "待 generate-peer laptop-billmiao → sync-inventory → wireguard-hub.yml"

  - name: laptop-sammao
    wg_ip: "10.200.10.3"
    public_key: null
    hub_peer: true
    member: sammao
    role: dev
    allowed_ips_client: "{{ wireguard_client_pool.allowed_ips_dev }}"
    persistent_keepalive: 25
    note: "待 generate-peer"

  - name: laptop-zhu
    wg_ip: "10.200.10.4"
    public_key: null
    hub_peer: true
    member: zhu
    role: dev
    allowed_ips_client: "{{ wireguard_client_pool.allowed_ips_dev }}"
    persistent_keepalive: 25
    note: "待 generate-peer"

  - name: laptop-xinxin
    wg_ip: "10.200.10.5"
    public_key: null
    hub_peer: true
    member: xinxin
    role: dev
    allowed_ips_client: "{{ wireguard_client_pool.allowed_ips_dev }}"
    persistent_keepalive: 25
    note: "待 generate-peer"
