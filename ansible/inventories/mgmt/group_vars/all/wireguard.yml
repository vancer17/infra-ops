# -----------------------------------------------------------------------------
# wireguard_peer_model — 同机多角色与 Hub [Peer] 登记策略（SSOT）
# -----------------------------------------------------------------------------
wireguard_peer_model:
  # single_peer_ci_01：yax 上仅一个 wg0 客户端，地址 10.200.0.2
  decision: single_peer_ci_01
  colocated_hosts: [ci-01, dev-01]
  # Hub Server 上登记的 Client Peer（有 public_key 的才会写入 wg0.conf）
  hub_active_peers:
    - ci-01
    - laptop-zhengyaoyuan
    - laptop-billmiao
    - laptop-sammao
    - laptop-zhu
    - laptop-xinxin
  # 仅 inventory/台账文档化，不在 Hub 上建 [Peer]
  hub_inactive_peers:
    - dev-01

# -----------------------------------------------------------------------------
# wireguard_client_pool — 人员 Client 网段与 AllowedIPs 配置档
# -----------------------------------------------------------------------------
# 台账 SSOT：docs/assets/wireguard-clients.yaml
wireguard_client_pool:
  cidr: "10.200.10.0/24"
  allowed_ips_dev: "10.200.0.0/24, 10.200.1.0/24, 10.200.2.0/24"
  allowed_ips_dev_ops: "10.200.0.0/16"

# -----------------------------------------------------------------------------
# wireguard — Server 接口参数
# -----------------------------------------------------------------------------
wireguard:
  # true = Hub 已安装 wg0（wireguard-hub.yml apply 完成）
  enabled: true

  interface: wg0

  # Hub Server 隧道地址（与 mgmt_hosts.hub-01.wg_ip 一致）
  hub_address: "10.200.0.1/24"

  # Hub 公钥（与 ansible/keys/wireguard/hub.pub 一致）
  hub_public_key: MNczHi1IQ4l8zkEPIQL1sPxSEPputkPdo2neaZWkFj8=

  listen_port: 51820

  ip_forward: true

  # not_started → keys_ready（E）→ server_up（F1）→ operational（F2 握手）
  status: operational

  keys_ready_at: "2026-06-14"
  server_up_at: "2026-06-14"
  operational_at: "2026-06-14"

# -----------------------------------------------------------------------------
# wireguard_peers_planned — Hub [Peer] 规划（公钥可提交 Git；私钥在 keys/*.private）
# -----------------------------------------------------------------------------
wireguard_peers_planned:
