# =============================================================================
# Ansible Inventory 变量：管理面 SSH 密钥与连接配置
# =============================================================================
#
# 【职责】
#   - 定义 Ansible 连接 Hub 时使用的用户（root / deploy）
#   - 与 dev 环境共用同一套 CI 部署密钥（infra-ci-deploy）
#   - 标记 SSH 加固阶段（bootstrap → steady）
#
# 【密钥体系】
#   Hub 与 Dev 使用**同一把** CI 公钥（ansible/keys/infra-ci-deploy.pub）：
#     CI 机生成密钥对 → 公钥分发到各 ECS 的 deploy 用户
#   这样从 CI 机可统一 SSH 到 Dev 与 Hub，无需多套密钥。
#
# 【私钥位置】
#   本地：ansible/keys/infra-ci-deploy（gitignore）
#   CI：GitHub Secret ANSIBLE_SSH_PRIVATE_KEY
#
# 【执行入口（Hub 专用脚本待后续实现）】
#   当前可复用：./scripts/dev/ssh-keys.sh all hub-01
#   需指定：-i ansible/inventories/mgmt/
#
# =============================================================================

---

# OpenSSH 公钥注释（写入 authorized_keys 行尾）
ssh_ci_key_comment: "infra-ci-deploy@121.41.58.20"

# 公钥路径：相对 inventory_dir 解析
# mgmt inventory_dir = ansible/inventories/mgmt/
# ../../keys = ansible/keys/
ssh_ci_pubkey_file: "{{ inventory_dir }}/../../keys/infra-ci-deploy.pub"

# 私钥路径（仅本地脚本使用，Ansible 模块不读取）
ssh_ci_private_key_file: "{{ inventory_dir }}/../../keys/infra-ci-deploy"

# 额外应急公钥（可选）
deploy_authorized_keys_extra: []

# Bootstrap 期用 root；1.3 分发密钥并 verify 后改为 deploy
ssh_inventory_user: root

deploy_authorized_keys: []

# bootstrap：允许 root 密钥登录（过渡）
# steady：仅 deploy，禁止 root
ssh_phase: bootstrap

ssh_keys_configured: false

github_secrets:
  ansible_ssh_private_key: ANSIBLE_SSH_PRIVATE_KEY
  ansible_ssh_known_hosts: ANSIBLE_SSH_KNOWN_HOSTS
