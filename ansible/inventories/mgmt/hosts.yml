---
# =============================================================================
# Ansible Inventory：管理面（mgmt）主机分组
# =============================================================================
#
# 【这个文件是什么】
#   Inventory（清单）定义「有哪些机器、如何分组」，不包含 IP 等细节。
#   细节在 host_vars/<主机名>.yml 与 group_vars/all/*.yml。
#
# 【与 inventories/dev/ 的分工】
#   dev/   → 应用环境（dev-01、dev-02）；跑 bootstrap.yml、未来的 dev-app.yml
#   mgmt/  → 管理面（hub-01 等）；跑 Hub Bootstrap、未来的 wireguard-hub.yml
#
#   刻意分离的原因：
#     1. 避免 `hosts: dev` 的 playbook 误操作 Hub
#     2. Hub 变量（WG Server、JumpServer）与 Dev 应用变量解耦
#     3. deploy.yml 可通过 -i 选择目标环境
#
# 【分组结构】
#   all
#     └── mgmt                    # 管理面顶层组（playbook 可用 hosts: mgmt）
#           └── mgmt_hub          # WireGuard Server / JumpServer 所在主机
#                 └── hub-01
#
# 【执行示例】
#   ansible-inventory -i ansible/inventories/mgmt/ --graph
#   ansible-playbook ansible/playbooks/bootstrap.yml \
#     -i ansible/inventories/mgmt/ --limit hub-01
#
# 【资产来源】
#   docs/assets/hub-01.yaml、docs/assets/registry.yaml
#
# =============================================================================

all:
  children:
    mgmt:
      children:
        mgmt_hub:
          hosts:
            hub-01:
