# =============================================================================
# Ansible Role 任务文件：docker — 安装 Docker CE 与 Compose 插件
# =============================================================================
#
# 【这个文件是什么】
#   Role（角色）里 tasks/main.yml 是「该 role 的默认任务入口」。
#   当 playbook 写 `- role: docker` 时，Ansible 会按顺序执行本文件中的每一个 task。
#
# 【文件位置与调用关系】
#   路径：ansible/roles/docker/tasks/main.yml
#   调用方：ansible/playbooks/bootstrap.yml
#
#   bootstrap.yml 中的编排顺序（顺序不可颠倒）：
#     1. common/base   → 系统基线、基础 apt 包
#     2. docker        → 本文件：安装 Docker，创建 docker 系统组
#     3. common/users  → 创建 deploy 用户并加入 docker 组
#
#   若先跑 users 再跑 docker，deploy 加入 docker 组会失败（组尚不存在）。
#
# 【Role 目录结构（本 role 相关）】
#   roles/docker/
#   ├── tasks/main.yml       ← 本文件：安装与配置任务
#   ├── handlers/main.yml    ← notify 触发的「重启 docker」
#   └── meta/main.yml        ← role 元数据（名称、最低 Ansible 版本）
#
# 【Task 语法速览】
#   每个 task 是一个 YAML 列表项（以 `- name:` 开头）：
#
#     - name: 人类可读的任务描述（日志里会显示）
#       ansible.builtin.apt:    # 「模块名」= 在目标机上执行的操作类型
#         name: [...]           # 模块参数（不同模块参数不同）
#         state: present
#       when: docker_install | bool   # 条件：false 则 skipped
#       tags: [docker, bootstrap]      # 标签：--tags docker 时只跑带此 tag 的 task
#       notify: Restart docker         # 若本 task changed，Play 末尾触发同名 handler
#
#   模块返回值状态（Ansible 输出里的颜色/统计）：
#     ok       → 已是期望状态，未改动
#     changed  → 做了修改（可能触发 notify）
#     skipped  → when 条件不满足
#     failed   → 失败，默认中止整个 Play
#
# 【变量来源】
#   docker_install: true          ← group_vars/all/bootstrap.yml
#   ansible_distribution_release   ← gather_facts 自动采集（Debian 12 → bookworm）
#   ansible_architecture           ← gather_facts（x86_64 / aarch64）
#
#   when: docker_install | bool
#     | bool 把 true/false/"yes"/"no" 等统一成布尔；设为 false 可跳过整个 role。
#
# 【安装策略】
#   使用 Docker 官方 apt 源（download.docker.com），禁止 snap / 裸 curl 脚本。
#   与 docs/bootstrap/dev-ecs-bootstrap.spec.yaml 中 install_method: official_apt_repo 一致。
#
# 【幂等性】
#   同一 playbook 连续跑两次：已安装的包、已存在的目录/文件 → ok，不应反复 changed。
#   仅 daemon.json 内容变化或首次安装时会 changed，并可能 notify 重启 docker。
#
# =============================================================================

---

# -----------------------------------------------------------------------------
# Task 1 — 安装 apt 依赖（Docker 源与 HTTPS 拉取所需）
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.apt
#   name:   要安装的 deb 包列表
#   state:  present = 确保已安装（不指定版本则装仓库最新）
# 说明：ca-certificates / curl 在 common/base 可能已装过；apt 模块幂等，重复执行 ok
- name: Install Docker apt dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 2 — 创建 apt 密钥环目录
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.file
#   path:  目标路径
#   state: directory = 确保是目录（不存在则创建）
#   mode:  "0755" 八进制权限；引号避免 YAML 把前导 0 当八进制歧义
# 说明：Debian 12 推荐把第三方 GPG 密钥放在 /etc/apt/keyrings/
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 3 — 下载 Docker 官方 GPG 公钥
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.get_url
#   url:  远程 HTTPS 地址
#   dest: 保存到目标机的本地路径
#   mode: 0644 = 所有人可读，仅 root 可写
# 说明：此密钥用于 apt 验证 download.docker.com 软件包签名
- name: Add Docker official GPG key
  ansible.builtin.get_url:
    url: http://mirrors.cloud.aliyuncs.com/docker-ce/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 4 — 添加 Docker 官方 apt 软件源（Deb822 格式）
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.deb822_repository
#   在 /etc/apt/sources.list.d/ 下写入 .sources 文件（Debian 12 推荐格式）
#   替代已弃用的 apt_repository 模块
#
# 参数说明：
#   name:         源标识，生成 docker.sources
#   types: deb    二进制 deb 包源
#   uris:         仓库根 URL
#   suites:       发行版代号，Jinja2 从 facts 注入：
#                 Debian 12 → ansible_distribution_release = bookworm
#   components:   stable = Docker CE 稳定通道
#   signed_by:    与 Task 3 下载的 GPG 密钥路径对应
#   architectures: >-
#                 YAML 折行语法，值为一行字符串
#                 replace 过滤器：Ansible facts 的 x86_64 → apt 需要的 amd64
#                                aarch64 → arm64
- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://mirrors.aliyun.com/docker-ce/linux/debian
    suites: "{{ ansible_distribution_release }}"
    components: stable
    signed_by: /etc/apt/keyrings/docker.asc
    architectures: >-
      {{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 5 — 安装 Docker CE 及 Compose v2 插件
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.apt
#   update_cache: true  → 先 apt update，再安装（因 Task 4 刚加了新源）
#   包说明：
#     docker-ce          → Docker 引擎（Community Edition）
#     docker-ce-cli      → docker 客户端命令
#     containerd.io      → 容器运行时（docker 依赖）
#     docker-compose-plugin → 提供 `docker compose` 子命令（v2，非独立 docker-compose 二进制）
# 安装完成后系统会自动创建 docker 用户组，供后续 deploy 用户加入
- name: Install Docker CE and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 6 — 写入 Docker 守护进程配置 daemon.json
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.copy
#   dest:    目标文件路径
#   content: |  多行字符串（literal block），直接写入文件内容
#   notify:  若本 task 导致 changed，在**当前 Play 所有 task 结束后**
#            执行 handlers/main.yml 里名为 "Restart docker" 的 handler（仅一次）
#
# daemon.json 字段含义：
#   log-driver json-file   → 容器日志写本地文件
#   max-size / max-file    → 单日志最大 10MB，最多保留 3 个，防止占满磁盘
#   live-restore: true      → dockerd 重启时尽量保持容器运行
- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true
      }
  notify: Restart docker
  when: docker_install | bool
  tags: [docker, bootstrap]

# -----------------------------------------------------------------------------
# Task 7 — 设置 Docker 服务开机自启并确保当前运行
# -----------------------------------------------------------------------------
# 模块：ansible.builtin.systemd
#   name:    systemd 单元名（docker.service）
#   enabled: true  → 开机自启
#   state: started → 当前处于 running（未运行则启动）
# 说明：首次安装后 docker 通常已启动；本 task 保证状态符合预期（幂等）
# 注意：若 Task 6 notify 了 Restart docker，handler 在本 task 之后执行重启
- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  when: docker_install | bool
  tags: [docker, bootstrap]
