# =============================================================================
# docker role — 默认变量
# =============================================================================

docker_daemon_log_driver: json-file
docker_daemon_log_max_size: "10m"
docker_daemon_log_max_file: "3"
docker_daemon_live_restore: true

# 为空时不写入 daemon.json；Dev VPC 在 bootstrap.yml 中配置以避开 172.20/172.21
# 示例：[{ "base": "172.30.0.0/16", "size": 24 }]
docker_daemon_default_address_pools: []
