# =============================================================================
# gateway_compose role — 主任务
# =============================================================================
# 目标机：同步 compose 项目 → 按 delivery 准备镜像 → compose up
# 镜像：make build-gateway-images（本地 tag）；可选 save/load bundle；或真实 ACR pull
# =============================================================================

---

- name: Assert gateway_compose_host is enabled on target
  ansible.builtin.assert:
    that:
      - gateway_compose_host | default(false) | bool
    fail_msg: "gateway_compose_host must be true (see host_vars/dev-01.yml)"
  tags: [gateway, gateway-compose, preflight]

- name: Assert gateway is enabled in inventory
  ansible.builtin.assert:
    that:
      - gateway_enabled | bool
    fail_msg: "Set gateway.enabled=true in group_vars/all/gateway.yml"
  tags: [gateway, gateway-compose, preflight]

- name: Assert infra-ops repository root is set for compose sync
  ansible.builtin.assert:
    that:
      - gateway_compose_infra_ops_root | length > 0
    fail_msg: >-
      gateway_compose_infra_ops_root must be set by playbook (playbook_dir/../..)
  tags: [gateway, gateway-compose, preflight]

- name: Stat compose project source on controller
  ansible.builtin.stat:
    path: "{{ gateway_compose_project_src }}"
  register: gateway_compose_src_stat
  delegate_to: localhost
  become: false
  tags: [gateway, gateway-compose, preflight]

- name: Assert docker/dev-gateway project exists in infra-ops checkout
  ansible.builtin.assert:
    that:
      - gateway_compose_src_stat.stat.isdir | default(false) | bool
    fail_msg: >-
      Missing {{ gateway_compose_project_src }} on controller — run from infra-ops repo checkout
  tags: [gateway, gateway-compose, preflight]

- name: Assert gateway images are configured
  ansible.builtin.assert:
    that:
      - gateway_image_certbot_init | length > 0
      - gateway_image_certbot_renew | length > 0
      - gateway_image_nginx | length > 0
      - gateway_image_tag | length > 0
    fail_msg: >-
      Configure gateway.images.namespace, gateway.images.tag, and image names in gateway.yml
  tags: [gateway, gateway-compose, preflight]

- name: Assert gateway image delivery mode is valid
  ansible.builtin.assert:
    that:
      - gateway_images_delivery in ['local', 'bundle', 'registry']
    fail_msg: "gateway.images.delivery must be local, bundle, or registry"
  tags: [gateway, gateway-compose, preflight]

- name: Assert registry delivery has registry_url
  ansible.builtin.assert:
    that:
      - gateway_image_registry_url | length > 0
    fail_msg: >-
      gateway.images.delivery=registry requires gateway.images.registry_url
      (真实私有仓库如阿里云 ACR；轩辕镜像站仅用于拉取公网基础镜像，不能 push 自建镜像)
  when: gateway_images_delivery == 'registry'
  tags: [gateway, gateway-compose, preflight]

- name: Stat image bundle on controller
  ansible.builtin.stat:
    path: "{{ gateway_compose_bundle_src_file }}"
  register: gateway_bundle_src_stat
  delegate_to: localhost
  become: false
  when: gateway_images_delivery == 'bundle'
  tags: [gateway, gateway-compose, preflight]

- name: Assert image bundle exists for bundle delivery
  ansible.builtin.assert:
    that:
      - gateway_bundle_src_stat.stat.isreg | default(false) | bool
    fail_msg: >-
      Missing {{ gateway_compose_bundle_src_file }} — run:
      make build-gateway-images save (or GATEWAY_IMAGE_TAG={{ gateway_image_tag }} ...)
  when: gateway_images_delivery == 'bundle'
  tags: [gateway, gateway-compose, preflight]

- name: Assert Certbot and DNS credentials are configured
  ansible.builtin.assert:
    that:
      - gateway_certbot_email | length > 0
      - gateway_certbot_email != 'you@example.com'
      - gateway_certbot_domains | length > 0
      - gateway_certbot_primary_domain | length > 0
      - gateway_nginx_server_names | length > 0
      - gateway_aliyun_dns_access_key | length > 0
      - gateway_aliyun_dns_access_key_secret | length > 0
    fail_msg: >-
      Configure gateway.certbot.email (real address, not you@example.com),
      gateway.certbot.* in gateway.yml, and gateway_secrets.aliyun_dns_* in
      secrets.yml (vault). See secrets.yml.example.
  tags: [gateway, gateway-compose, preflight]

- name: Assert application upstream port matches gateway upstream
  ansible.builtin.assert:
    that:
      - gateway_upstream_port | int == app.listen.port | default(8080) | int
    fail_msg: "gateway.upstream.port must match app.listen.port"
  tags: [gateway, gateway-compose, preflight]

- name: Warn when host Nginx runtime is still active in inventory
  ansible.builtin.debug:
    msg: >-
      INFO: nginx.runtime is '{{ nginx.runtime | default('host') }}'.
      After successful apply, set nginx.runtime=compose and gateway.status=operational;
      do not re-run nginx-dev.yml on this host.
  when: nginx.runtime | default('host') != 'compose'
  tags: [gateway, gateway-compose, preflight]

- name: Ensure rsync is installed on target for compose project sync
  ansible.builtin.apt:
    name: rsync
    state: present
  tags: [gateway, gateway-compose, sync]

- name: Ensure gateway Compose project directory exists
  ansible.builtin.file:
    path: "{{ gateway_compose_project_dir }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0750"
  tags: [gateway, gateway-compose, sync]

- name: Sync dev-gateway Compose project to target
  ansible.posix.synchronize:
    src: "{{ gateway_compose_project_src }}/"
    dest: "{{ gateway_compose_project_dir }}/"
    delete: "{{ gateway_compose_sync_delete | bool }}"
    recursive: true
    rsync_opts:
      - "--exclude=.env"
      - "--exclude=.env.*"
      - "--exclude=bundles/*.tar"
  delegate_to: localhost
  become: false
  tags: [gateway, gateway-compose, sync]

- name: Ensure deploy owns synced gateway compose project
  ansible.builtin.file:
    path: "{{ gateway_compose_project_dir }}"
    owner: deploy
    group: deploy
    recurse: true
  tags: [gateway, gateway-compose, sync]

- name: Deploy gateway Compose environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ gateway_compose_env_file }}"
    owner: deploy
    group: deploy
    mode: "0600"
  tags: [gateway, gateway-compose, config]

- name: Disable and stop host Nginx to release ports 80/443
  ansible.builtin.systemd:
    name: "{{ gateway_host_nginx_package }}"
    enabled: false
    state: stopped
  register: gateway_host_nginx_stop
  failed_when: false
  when:
    - gateway_host_nginx_disable | bool
    - not ansible_check_mode
  tags: [gateway, gateway-compose, host-nginx]

- name: Report host Nginx stop result
  ansible.builtin.debug:
    msg: >-
      host nginx.service: {{ gateway_host_nginx_stop.status.ActiveState | default('unknown') }}
      (changed={{ gateway_host_nginx_stop.changed | default(false) }})
  when:
    - gateway_host_nginx_disable | bool
    - gateway_host_nginx_stop is defined
    - not ansible_check_mode
  tags: [gateway, gateway-compose, host-nginx]

- name: Ensure gateway image bundle directory on target
  ansible.builtin.file:
    path: "{{ gateway_compose_bundle_dest }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0750"
  when:
    - gateway_images_delivery == 'bundle'
    - not ansible_check_mode
  tags: [gateway, gateway-compose, images]

- name: Sync gateway image bundle to target
  ansible.builtin.copy:
    src: "{{ gateway_compose_bundle_src_file }}"
    dest: "{{ gateway_compose_bundle_dest_file }}"
    owner: deploy
    group: deploy
    mode: "0644"
  when:
    - gateway_images_delivery == 'bundle'
    - not ansible_check_mode
  tags: [gateway, gateway-compose, images]

- name: Load gateway images from bundle on target
  community.docker.docker_image:
    load_path: "{{ gateway_compose_bundle_dest_file }}"
    source: load
  become: true
  become_user: deploy
  when:
    - gateway_images_delivery == 'bundle'
    - not ansible_check_mode
  tags: [gateway, gateway-compose, images]

- name: Verify local gateway images exist on target
  ansible.builtin.command:
    cmd: docker image inspect {{ item }}
  loop: "{{ gateway_compose_image_refs }}"
  register: gateway_local_image_inspect
  changed_when: false
  failed_when: gateway_local_image_inspect.rc != 0
  become: true
  become_user: deploy
  when:
    - gateway_images_delivery == 'local'
    - not ansible_check_mode
  tags: [gateway, gateway-compose, images]

- name: Pull gateway images from private registry
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
    force_source: true
  loop: "{{ gateway_compose_images_to_pull }}"
  become: true
  become_user: deploy
  when:
    - gateway_images_delivery == 'registry'
    - not ansible_check_mode
  tags: [gateway, gateway-compose, images]

- name: Start Dev gateway stack with Docker Compose (no build)
  community.docker.docker_compose_v2:
    project_src: "{{ gateway_compose_project_dir }}"
    project_name: "{{ gateway_compose_project_name }}"
    state: present
    build: never
    pull: "{{ gateway_compose_pull }}"
    recreate: auto
  become: true
  become_user: deploy
  register: gateway_compose_result
  when: not ansible_check_mode
  tags: [gateway, gateway-compose, compose]

- name: Preview gateway Compose deployment (check mode)
  ansible.builtin.debug:
    msg:
      - "check mode: would sync {{ gateway_compose_project_src }} → {{ gateway_compose_project_dir }}"
      - "check mode: would render {{ gateway_compose_env_file }}"
      - "check mode: would disable host {{ gateway_host_nginx_package }}.service"
      - "images delivery: {{ gateway_images_delivery }}"
      - "check mode: images {{ gateway_compose_image_refs | join(', ') }}"
      - "check mode: would docker compose up in {{ gateway_compose_project_dir }} (build=never, pull={{ gateway_compose_pull }})"
      - "Domains: {{ gateway_certbot_domains }} (staging={{ gateway_certbot_staging }})"
      - "App deploy_status: {{ gateway_app_deploy_status }} → upstream probe {{ gateway_upstream_health_path }}, public {{ gateway_health_public_url }}"
      - "Health wait retries: {{ gateway_health_retries }} × {{ gateway_health_delay }}s"
  when: ansible_check_mode
  tags: [gateway, gateway-compose, compose]

- name: Wait for certbot-renew to become healthy
  ansible.builtin.command:
    cmd: docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' dev-gateway-certbot-renew
  register: gateway_renew_health
  until: gateway_renew_health.stdout == 'healthy'
  retries: "{{ gateway_health_retries }}"
  delay: "{{ gateway_health_delay }}"
  changed_when: false
  when: not ansible_check_mode
  tags: [gateway, gateway-compose, verify]

- name: Wait for HTTPS port after gateway Nginx starts
  ansible.builtin.wait_for:
    port: 443
    host: 127.0.0.1
    timeout: "{{ (gateway_health_delay | int) * 6 }}"
  when: not ansible_check_mode
  tags: [gateway, gateway-compose, verify]

- name: Verify public HTTPS health endpoint (Let's Encrypt)
  ansible.builtin.uri:
    url: "{{ gateway_health_public_url }}"
    validate_certs: "{{ gateway_health_validate_certs | bool }}"
    status_code: "{{ gateway_health_expect_status }}"
  register: gateway_public_health
  until: gateway_public_health is succeeded
  retries: "{{ gateway_health_retries }}"
  delay: "{{ gateway_health_delay }}"
  when:
    - not ansible_check_mode
    - gateway_health_public_url | length > 0
  tags: [gateway, gateway-compose, verify]

- name: Show Dev gateway container status
  ansible.builtin.command:
    cmd: docker ps --filter "name=dev-gateway-"
  become: true
  become_user: deploy
  register: gateway_ps
  changed_when: false
  when: not ansible_check_mode
  tags: [gateway, gateway-compose, verify]

- name: Gateway Compose deployment summary
  ansible.builtin.debug:
    msg:
      - "Dev gateway Compose applied on {{ inventory_hostname }}"
      - "Project: {{ gateway_compose_project_dir }} ({{ gateway_compose_project_name }})"
      - "Images ({{ gateway_images_delivery }}): init={{ gateway_image_certbot_init_ref }}, renew={{ gateway_image_certbot_renew_ref }}, nginx={{ gateway_image_nginx_ref }}"
      - "LE domain: {{ gateway_certbot_primary_domain }} (staging={{ gateway_certbot_staging }})"
      - "App deploy_status: {{ gateway_app_deploy_status }}"
      - "Public probe: {{ gateway_health_public_url }}"
      - "Containers: {{ gateway_ps.stdout | default('skipped in check mode') }}"
      - "Update inventory: nginx.runtime=compose, gateway.status=operational, nginx.status=operational"
      - "Do not re-run nginx-dev.yml; host nginx.service should remain disabled"
      - "Runbook: docs/docker/dev-gateway.runbook.md"
  tags: [gateway, gateway-compose, verify]
