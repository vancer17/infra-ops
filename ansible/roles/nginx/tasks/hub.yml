# =============================================================================
# nginx role — Hub 管理面网关（阶段 G1）
# =============================================================================
#
# 消费者变量：inventories/mgmt/group_vars/all/nginx.yml
#   nginx.enabled / nginx.ssl.* / nginx.health_uri
# host_vars：nginx_gateway: true（hub-01）
#
# 执行顺序：安装 → SSL 目录与自签证书 → 移除 default 站点 → 部署 vhost → 启服务
#
# --check 说明：command（openssl）在演练模式不执行；权限与 symlink 任务在目标文件
# 尚不存在时跳过，避免「标记 changed 但未创建文件」导致后续 file 任务失败。
#
# =============================================================================

---

# -----------------------------------------------------------------------------
# 0. JumpServer 生命周期门禁（防止 G4 后 inventory 未同步时静默回退 503）
# -----------------------------------------------------------------------------
- name: Probe JumpServer HTTP upstream before refreshing jms vhost
  ansible.builtin.uri:
    url: "http://{{ nginx.jumpserver_upstream | default('127.0.0.1:8080') }}/"
    status_code: [200, 302, 401]
    follow_redirects: none
  register: nginx_jms_upstream_probe
  failed_when: false
  when:
    - not ansible_check_mode
    - nginx.jumpserver.deploy_status | default('pending') == 'pending'
  tags: [nginx, nginx-hub, preflight, nginx-g2]

- name: Assert nginx.jumpserver.deploy_status when JumpServer upstream is live
  ansible.builtin.assert:
    that:
      - nginx.jumpserver.deploy_status | default('pending') == 'ready'
    fail_msg: >-
      JumpServer responds on {{ nginx.jumpserver_upstream | default('127.0.0.1:8080') }}
      but nginx.jumpserver.deploy_status=pending. Set deploy_status=ready and
      jumpserver.status=operational in inventory before re-applying Hub Nginx,
      or run hub-g4-jumpserver.yml to refresh the vhost.
  when:
    - not ansible_check_mode
    - nginx_jms_upstream_probe is defined
    - nginx_jms_upstream_probe is succeeded
  tags: [nginx, nginx-hub, preflight, nginx-g2]

- name: Assert jumpserver.status and deploy_status stay in sync
  ansible.builtin.assert:
    that:
      - jumpserver.status | default('not_started') != 'operational'
        or nginx.jumpserver.deploy_status | default('pending') == 'ready'
    fail_msg: >-
      jumpserver.status=operational requires nginx.jumpserver.deploy_status=ready
      in inventory before re-applying Hub Nginx jms vhost.
  tags: [nginx, nginx-hub, preflight, nginx-g2]

# -----------------------------------------------------------------------------
# 1. 安装 Nginx（Debian 官方包）
# -----------------------------------------------------------------------------
- name: Install Nginx and OpenSSL packages
  ansible.builtin.apt:
    name:
      - "{{ nginx.package_name | default('nginx') }}"
      - openssl
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [nginx, nginx-hub, install]

# -----------------------------------------------------------------------------
# 2. SSL 目录（私钥与证书仅驻留 Hub，不进 Git）
# -----------------------------------------------------------------------------
- name: Ensure Nginx SSL directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  tags: [nginx, nginx-hub, ssl]

- name: Ensure Nginx snippets directory exists
  ansible.builtin.file:
    path: "{{ nginx_snippets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [nginx, nginx-hub, config]

# -----------------------------------------------------------------------------
# 3. 内网自签证书（hub.internal / jms.internal / 10.200.0.1）
# -----------------------------------------------------------------------------
- name: Build subjectAltName string for Hub internal certificate
  ansible.builtin.set_fact:
    nginx_ssl_san_csv: "{{ nginx.ssl.subject_alt_names | default([]) | join(',') }}"
  when: nginx.ssl.self_signed | default(true) | bool
  tags: [nginx, nginx-hub, ssl]

- name: Generate Hub internal self-signed TLS certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -nodes
      - -days
      - "{{ nginx.ssl.days | default(3650) | string }}"
      - -newkey
      - rsa:2048
      - -keyout
      - "{{ nginx_ssl_private_key_path }}"
      - -out
      - "{{ nginx_ssl_certificate_path }}"
      - -subj
      - "/CN={{ nginx.ssl.common_name | default('hub.internal') }}"
      - -addext
      - "subjectAltName={{ nginx_ssl_san_csv }}"
  args:
    creates: "{{ nginx_ssl_certificate_path }}"
  when:
    - nginx.ssl.self_signed | default(true) | bool
    - nginx_ssl_san_csv | length > 0
  tags: [nginx, nginx-hub, ssl]

- name: Stat Hub TLS private key for permission fix
  ansible.builtin.stat:
    path: "{{ nginx_ssl_private_key_path }}"
  register: nginx_ssl_key_stat
  when: nginx.ssl.self_signed | default(true) | bool
  tags: [nginx, nginx-hub, ssl]

- name: Set restrictive permissions on Hub TLS private key
  ansible.builtin.file:
    path: "{{ nginx_ssl_private_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - nginx.ssl.self_signed | default(true) | bool
    - nginx_ssl_key_stat.stat.exists | default(false)
  tags: [nginx, nginx-hub, ssl]

- name: Stat Hub TLS certificate for permission fix
  ansible.builtin.stat:
    path: "{{ nginx_ssl_certificate_path }}"
  register: nginx_ssl_cert_stat
  when: nginx.ssl.self_signed | default(true) | bool
  tags: [nginx, nginx-hub, ssl]

- name: Set permissions on Hub TLS certificate
  ansible.builtin.file:
    path: "{{ nginx_ssl_certificate_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - nginx.ssl.self_signed | default(true) | bool
    - nginx_ssl_cert_stat.stat.exists | default(false)
  tags: [nginx, nginx-hub, ssl]

# -----------------------------------------------------------------------------
# 4. 共享 SSL 参数片段
# -----------------------------------------------------------------------------
- name: Deploy Hub internal TLS snippet
  ansible.builtin.template:
    src: ssl-hub-internal.conf.j2
    dest: "{{ nginx_snippets_dir }}/ssl-hub-internal.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

# -----------------------------------------------------------------------------
# 5. 移除 Debian 默认站点，避免与 Hub vhost 冲突
# -----------------------------------------------------------------------------
- name: Remove default Nginx site when configured
  ansible.builtin.file:
    path: "{{ nginx_sites_enabled_dir }}/default"
    state: absent
  when: nginx.remove_default_site | default(true) | bool
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

# -----------------------------------------------------------------------------
# 6. Hub 默认站点（hub.internal / 10.200.0.1）+ JumpServer 预留（jms.internal）
# -----------------------------------------------------------------------------
- name: Deploy WebSocket upgrade map for JumpServer proxy
  ansible.builtin.template:
    src: hub-ws-map.conf.j2
    dest: /etc/nginx/conf.d/hub-ws-map.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

- name: Deploy JumpServer upstream block for Nginx
  ansible.builtin.template:
    src: hub-jms-upstream.conf.j2
    dest: /etc/nginx/conf.d/hub-jms-upstream.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config, nginx-g2]

- name: Ensure infra-ops static web root exists
  ansible.builtin.file:
    path: "{{ nginx_infra_ops_www_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [nginx, nginx-hub, config, nginx-g2]

- name: Deploy JumpServer upstream status JSON
  ansible.builtin.template:
    src: jms-status.json.j2
    dest: "{{ nginx_infra_ops_www_root }}/jms-status.json"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config, nginx-g2]

- name: Deploy Hub default site configuration
  ansible.builtin.template:
    src: hub-default.conf.j2
    dest: "{{ nginx_sites_available_dir }}/hub-internal-default.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

- name: Stat Hub default site configuration for enablement
  ansible.builtin.stat:
    path: "{{ nginx_sites_available_dir }}/hub-internal-default.conf"
  register: hub_default_site_stat
  tags: [nginx, nginx-hub, config]

- name: Enable Hub default site
  ansible.builtin.file:
    src: "{{ nginx_sites_available_dir }}/hub-internal-default.conf"
    dest: "{{ nginx_sites_enabled_dir }}/hub-internal-default.conf"
    state: link
  when: hub_default_site_stat.stat.exists | default(false)
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

- name: Deploy JumpServer reverse proxy site (upstream placeholder)
  ansible.builtin.template:
    src: hub-jms.conf.j2
    dest: "{{ nginx_sites_available_dir }}/hub-internal-jms.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

- name: Stat JumpServer proxy site configuration for enablement
  ansible.builtin.stat:
    path: "{{ nginx_sites_available_dir }}/hub-internal-jms.conf"
  register: hub_jms_site_stat
  tags: [nginx, nginx-hub, config]

- name: Enable JumpServer reverse proxy site
  ansible.builtin.file:
    src: "{{ nginx_sites_available_dir }}/hub-internal-jms.conf"
    dest: "{{ nginx_sites_enabled_dir }}/hub-internal-jms.conf"
    state: link
  when: hub_jms_site_stat.stat.exists | default(false)
  notify: Reload nginx
  tags: [nginx, nginx-hub, config]

# -----------------------------------------------------------------------------
# 7. 启用并启动 nginx 服务
# -----------------------------------------------------------------------------
- name: Enable and start Nginx service
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode
  tags: [nginx, nginx-hub, service]

# -----------------------------------------------------------------------------
# 8. 配置语法检查（即时反馈，不依赖 handler 顺序）
# -----------------------------------------------------------------------------
- name: Verify Nginx configuration syntax
  ansible.builtin.command: nginx -t
  register: nginx_syntax_check
  changed_when: false
  failed_when: nginx_syntax_check.rc != 0
  when: not ansible_check_mode
  tags: [nginx, nginx-hub, verify]
