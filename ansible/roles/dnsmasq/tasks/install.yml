# =============================================================================
# dnsmasq role — Hub 内网 DNS 安装任务（阶段 G2）
# =============================================================================
#
# 由 tasks/main.yml / tasks/hub.yml 在 dns_gateway=true 时导入。
# 前提：WireGuard wg0 @ {{ dnsmasq_listen_address }} 已 operational
#
# =============================================================================

---

- name: Install dnsmasq and DNS utilities
  ansible.builtin.apt:
    name:
      - "{{ dnsmasq_package_name }}"
      - bind9-dnsutils
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [dnsmasq, dns, install]

- name: Ensure dnsmasq configuration directory exists
  ansible.builtin.file:
    path: "{{ dnsmasq_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [dnsmasq, dns, config]

- name: Ensure dnsmasq systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/dnsmasq.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [dnsmasq, dns, config, service]

- name: Configure dnsmasq to start after WireGuard wg0
  ansible.builtin.copy:
    dest: /etc/systemd/system/dnsmasq.service.d/after-wg0.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible infra-ops (dnsmasq role)
      [Unit]
      After=wg-quick@{{ dnsmasq_interface }}.service
      Wants=wg-quick@{{ dnsmasq_interface }}.service
      Requires=wg-quick@{{ dnsmasq_interface }}.service
  notify: Restart dnsmasq
  tags: [dnsmasq, dns, config, service]

- name: Deploy Hub internal DNS dnsmasq configuration
  ansible.builtin.template:
    src: infra-ops-internal.conf.j2
    dest: "{{ dnsmasq_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq
  tags: [dnsmasq, dns, config]

- name: Ensure dnsmasq log file exists
  ansible.builtin.file:
    path: /var/log/dnsmasq.log
    state: touch
    owner: root
    group: root
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  tags: [dnsmasq, dns, config]

- name: Enable and start dnsmasq service
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode
  tags: [dnsmasq, dns, service]

- name: Verify dnsmasq listens on WireGuard DNS address
  ansible.builtin.wait_for:
    host: "{{ dnsmasq_listen_address }}"
    port: 53
    timeout: 30
  when: not ansible_check_mode
  tags: [dnsmasq, dns, verify]
