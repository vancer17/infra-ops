# =============================================================================
# wireguard role 默认入口
# =============================================================================
#
# Hub playbook 使用 tasks_from: server 直接调用 server.yml。
# 默认 main.yml 在 wireguard_server=true 时同样走 Server 路径，便于 ad-hoc：
#
#   ansible-playbook ... -e "wireguard_server=true" --tags wireguard
#
# Client 模式：wireguard-peer.yml 使用 tasks_from: client
#
# =============================================================================

---

- name: Apply WireGuard Hub server tasks
  ansible.builtin.import_tasks: server.yml
  when: wireguard_server | default(false) | bool
  tags: [wireguard, server]

- name: Apply WireGuard Peer client tasks
  ansible.builtin.import_tasks: client.yml
  when:
    - wireguard_peer | default(false) | bool
    - not (wireguard_server | default(false) | bool)
  tags: [wireguard, client]
