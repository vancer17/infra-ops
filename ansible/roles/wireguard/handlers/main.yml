# =============================================================================
# wireguard role handlers
# =============================================================================
#
# 配置变更后重载 wg 接口。使用 systemd restart wg-quick@wg0，
# 等价于 wg-quick down && wg-quick up，适合 Server 端 Peer 列表变更。
#
# =============================================================================

---

- name: Restart wireguard interface
  ansible.builtin.systemd:
    name: "{{ wireguard_systemd_unit }}"
    enabled: true
    state: restarted
  when: not (wireguard_client_use_limited_sudo | bool)
  listen: Restart wireguard interface

- name: Restart wireguard client interface
  ansible.builtin.command: "sudo -n /bin/systemctl restart {{ wireguard_systemd_unit }}"
  changed_when: true
  when: wireguard_client_use_limited_sudo | bool
  listen:
    - Restart wireguard client interface
    - Restart wireguard interface
