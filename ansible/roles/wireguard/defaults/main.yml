# =============================================================================
# wireguard role 默认值（可被 inventory group_vars 覆盖）
# =============================================================================
#
# inventory 中 wireguard.* 已定义大部分参数；此处仅放 role 内部路径默认值。
#
# =============================================================================

---

# wg 配置文件目录（Debian wireguard-tools 标准路径）
wireguard_config_dir: /etc/wireguard

# 配置文件完整路径；interface 来自 inventory wireguard.interface
wireguard_config_path: "{{ wireguard_config_dir }}/{{ wireguard.interface | default('wg0') }}.conf"

# sysctl drop-in 文件名
wireguard_sysctl_dropin: /etc/sysctl.d/99-wireguard-ip-forward.conf

# systemd 单元名（wg-quick@wg0）
wireguard_systemd_unit: "wg-quick@{{ wireguard.interface | default('wg0') }}"

# Hub Server 配置不写 SaveConfig，由 Ansible 全量管理
wireguard_save_config: false

# -----------------------------------------------------------------------------
# Client（Peer）默认值 — wireguard-peer.yml / tasks/client.yml
# -----------------------------------------------------------------------------
# ci-01 等 ECS Peer 须在 host_vars 设 true；Hub Server 保持 false（默认）
wireguard_client_use_limited_sudo: false

# 渲染后暂存路径（再 sudo tee 到 /etc/wireguard/wg0.conf）
wireguard_client_staging_dir: "{{ playbook_dir }}/../.ansible-staging/wireguard"
wireguard_client_staging_path: "{{ wireguard_client_staging_dir }}/wg0-{{ wireguard_peer_name | default('peer') }}.conf"

# Peer 私钥路径（相对 inventory_dir）
wireguard_peer_private_key_path: "{{ inventory_dir }}/../../keys/wireguard/{{ wireguard_peer_name }}.private"

# 默认路由（可被 wireguard_peers_planned[].allowed_ips 覆盖）
wireguard_client_default_allowed_ips: "10.200.0.0/16"
wireguard_client_default_persistent_keepalive: 25

# 阶段 G2：Hub 内网 DNS（internal_dns.wireguard_client_dns）
# 仅当 internal_dns.status=operational 时写入 WG Client DNS= 行
# 须 hub-g2.yml apply 后再 wireguard-peer.yml
wireguard_client_dns: >-
  {{
    internal_dns.wireguard_client_dns
    if (
      internal_dns.enabled | default(false) | bool
      and internal_dns.status | default('') == 'operational'
    )
    else ''
  }}
