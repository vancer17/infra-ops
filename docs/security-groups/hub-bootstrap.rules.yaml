# Hub-01 Bootstrap 阶段安全组规则
# 适用：hub-01（121.43.49.58 / 172.21.127.123）
#
# 【2026-06-08 资产台账修订】
#   CI 替代机：121.41.58.20（公网）/ 172.21.226.38（私网，与 Hub 同 VPC）
#   Ansible Bootstrap 优先使用 Hub 私网 172.21.127.123 → 须放行 CI 私网 SSH
#   须与 docs/assets/hub-01.yaml、inventories/mgmt/group_vars/all/network.yml 一致
#
# 【2026-06-14 控制台事实】
#   Hub 实例当前绑定与 Dev 相同的安全组 id：sg-bp122tjy3h95um8kv4f9
#   （控制台名称可能为 sg-dev-ecs-bootstrap）。
#   UDP 51820 规则已合并写入 dev-ecs-bootstrap.rules.yaml（IN-WG-*），
#   绑定该 id 的 Hub 与 Dev 共享同一套入站规则。
#
# 【控制台操作】
#   若将来 Hub 独立建组：创建 sg-hub-bootstrap → 绑定 hub-01 → 回填 id
#
schema_version: "1"
phase: bootstrap
updated_at: "2026-06-14"
security_group:
  name: sg-dev-ecs-bootstrap
  id: sg-bp122tjy3h95um8kv4f9
  description: "Hub 当前与 Dev 共用此 id；WG 完成后 Hub 可迁移 sg-hub-wg"
  region: cn-hangzhou
  vpc_id: vpc-bp1jmugctnhj97dbjyx31
  shared_with_hosts: [hub-01, dev-01, dev-02, ci-01]
  udp_rules_authoritative_file: docs/security-groups/dev-ecs-bootstrap.rules.yaml

rules:
  inbound:
    - id: IN-SSH-CI-PRIVATE
      priority: 1
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "172.21.226.38/32"
      description: "Bootstrap-CI-Private-SSH"
      note: "ci-01 私网；同 VPC Ansible 优先路径"
      expires_at_phase: wireguard

    - id: IN-SSH-CI
      priority: 2
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "121.41.58.20/32"
      description: "Bootstrap-CI-Public-SSH"
      note: "ci-01 公网回退"
      expires_at_phase: wireguard

    - id: IN-SSH-OFFICE
      priority: 3
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "115.195.216.251/32"
      description: "Bootstrap-Office-SSH-Temporary"
      expires_at_phase: wireguard

    - id: IN-WG-UDP
      priority: 10
      policy: accept
      protocol: udp
      port_range: "51820/51820"
      source: "115.195.216.251/32"
      description: "WireGuard-Server-Office"
      note: "WG 实施前可预置；Peer 接入后按需追加 CI 公网"

    - id: IN-WG-UDP-CI
      priority: 11
      policy: accept
      protocol: udp
      port_range: "51820/51820"
      source: "121.41.58.20/32"
      description: "WireGuard-Server-CI"
      note: "Hub WG Server 监听；实施 WG 时启用"

  outbound:
    - id: OUT-ALL
      priority: 1
      policy: accept
      protocol: all
      port_range: "-1/-1"
      destination: "0.0.0.0/0"
      description: "Allow-all-egress"
