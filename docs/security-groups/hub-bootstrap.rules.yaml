# Hub-01 Bootstrap 阶段安全组规则
# 适用：hub-01（121.43.49.58 / 172.21.127.123）
#
# 【2026-06-08 资产台账修订】
#   CI 替代机：121.41.58.20（公网）/ 172.21.226.38（私网，与 Hub 同 VPC）
#   Ansible 连 Hub（F2-5 主路径）：经 WG 10.200.0.1；应急回退仍用 Hub 私网 172.21.127.123
#   → 须放行 CI 私网 SSH（172.21.226.38）及 WG UDP 51820（见 dev-ecs-bootstrap IN-WG-*）
#   须与 docs/assets/hub-01.yaml、inventories/mgmt/group_vars/all/network.yml 一致
#
# 【2026-06-14 控制台事实（已 superseded）】
#   Hub 曾与 Dev 共用 sg-bp122tjy3h95um8kv4f9；UDP 51820 见 dev-ecs-bootstrap IN-WG-*。
#
# 【2026-06-15 起】
#   Hub 独占规则集见 hub-wg.rules.yaml；本文件仅作 bootstrap 历史参考。
#
schema_version: "1"
phase: bootstrap
status: superseded
superseded_by: docs/security-groups/hub-wg.rules.yaml
superseded_at: "2026-06-15"
updated_at: "2026-06-15"
security_group:
  name: sg-dev-ecs-bootstrap
  id: sg-bp122tjy3h95um8kv4f9
  description: "历史：Hub bootstrap 期与 Dev 共用；2026-06-15 起 Hub 见 hub-wg.rules.yaml"
  region: cn-hangzhou
  vpc_id: vpc-bp1jmugctnhj97dbjyx31
  shared_with_hosts: [hub-01, dev-01, dev-02, ci-01]
  udp_rules_authoritative_file: docs/security-groups/dev-ecs-bootstrap.rules.yaml

rules:
  inbound:
    - id: IN-SSH-CI-PRIVATE
      priority: 1
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "172.21.226.38/32"
      description: "Bootstrap-CI-Private-SSH"
      note: "ci-01 私网；同 VPC Ansible 优先路径"
      expires_at_phase: wireguard

    - id: IN-SSH-CI
      priority: 2
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "121.41.58.20/32"
      description: "Bootstrap-CI-Public-SSH"
      note: "ci-01 公网回退"
      expires_at_phase: wireguard

    - id: IN-SSH-OFFICE
      priority: 3
      policy: accept
      protocol: tcp
      port_range: "22/22"
      source: "115.195.216.251/32"
      description: "Bootstrap-Office-SSH-Temporary"
      expires_at_phase: wireguard

    - id: IN-WG-UDP
      priority: 10
      policy: accept
      protocol: udp
      port_range: "51820/51820"
      source: "115.195.216.251/32"
      description: "WireGuard-Server-Office"
      note: "WG 实施前可预置；Peer 接入后按需追加 CI 公网"

    - id: IN-WG-UDP-CI
      priority: 11
      policy: accept
      protocol: udp
      port_range: "51820/51820"
      source: "121.41.58.20/32"
      description: "WireGuard-Server-CI"
      note: "Hub WG Server 监听；实施 WG 时启用"

  outbound:
    - id: OUT-ALL
      priority: 1
      policy: accept
      protocol: all
      port_range: "-1/-1"
      destination: "0.0.0.0/0"
      description: "Allow-all-egress"
