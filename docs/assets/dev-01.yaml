# Dev-01 资产台账
# 维护规则：公网 IP / 角色 / 环境 不变则不改；内网 IP、安全组 ID 以阿里云为准
schema_version: "1"
updated_at: "2026-06-08"          # 末次台账修订日期
updated_by: "郑尧元"

host:
  name: dev-01
  role: dev_app
  env: dev
  description: "主应用 Web/API + Nginx 反代"

  # --- 阿里云 ECS ---
  cloud:
    provider: aliyun
    region: "cn-hangzhou"
    instance_id: "i-bp14czvx1exdi6zmrt2r"
    instance_type: "ecs.s6-c1m2.2xlarge"
    vpc_id: "vpc-bp1jmugctnhj97dxjyr31"
    vswitch_id: "vsw-bp1th8ab5ibjii9me684i"

  # --- 网络地址 ---
  network:
    public_ip: "121.41.58.20"
    private_ip: "172.21.226.38"            # 重置后必查：ECS 详情 → 主私网 IP
    eip_bound: true                      # 是否绑定弹性公网 IP
    planned_wg_ip: "10.200.1.1"         # 阶段 5 启用
    hostname: "iZbp14czvx1exdi6zmrt2rZ"
    ci_same_vpc: false
    ci_access_from: "public"             # CI 跨 VPC，Ansible/SSH 走公网

  # --- 安全组 ---
  security_groups:
    bootstrap:
      - id: "sg-bp122tjy3h95um8kv4f9"
        name: "sg-dev-ecs-bootstrap"
        attached_at: "2026-06-08"
        phase: bootstrap
        note: "Bootstrap 临时策略；WG 完成后迁移至 sg-dev-ecs-wg"
    target:                              # 阶段 5 预填，本期不创建
      - id: null
        name: "sg-dev-ecs-wg"
        phase: wireguard

  # --- RAM（阶段 0.4 绑定，Bootstrap 前可先 null）---
  ram_role:
    name: "Dev-ECS-Role"
    attached: false                      # 绑定后改 true

  # --- 关联依赖（1.1 同步记录，实际配置在各云产品控制台）---
  dependencies:
    rds:
      instance: "rm-bp1wjjf373l7t331vno"
      endpoint: "rm-bp1wjjf373l7t331vno.mysql.rds.aliyuncs.com"
      whitelist_group: "dev-ecs"
      whitelist_ip: "172.21.226.38/32"       # = private_ip，仅内网
    oss:
      buckets:
        - name: "yzx-file-storage"
          prefix: "dev/"
        - name: "taoyouxiangzu"
          prefix: "dev/"

  # --- Bootstrap 访问白名单（安全组规则的源 IP 引用）---
  access_whitelist:
    ci_public_ip: "47.98.161.33/32"
    office_egress_ips:
      - "115.206.212.16/32"              # 可多条，每人/每地一条
    note: "禁止 0.0.0.0/0 入站 SSH"

  # --- 状态 ---
  lifecycle:
    os: "Debian 12"
    reset_at: "2026-06-08"
    bootstrap_status: "sg_done"          # pending | sg_done | bootstrap_done
    baota_installed: false
