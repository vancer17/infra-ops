# =============================================================================
# Dev-01 资产台账 — Dev 主应用节点
# =============================================================================
#
# 【角色说明】
#   Dev 环境主应用机：Web/API、业务网关统一出口（Compose Nginx 80/443 → 127.0.0.1:8080）。
#   2026-06-22：API 域名迁移 yizuxing.com + MQTT 路线 A（MQTTS 8883）；见阶段 J acceptance。
#   2026-06-30：device-management-system 通过 /device-management 路径隔离接入 127.0.0.1:18080。
#
# 【与 CI-01 同机】
#   本台 ECS（控制台 yax）同时承担 ci-01 角色，见 ci-01.yaml 与 registry.yaml。
#   字段 instance_id / public_ip / private_ip 与 ci-01 一致，勿填不同值。
#
# 【WireGuard】
#   Hub Peer 模型为 single_peer_ci_01：WG 隧道由 ci-01（10.200.0.2）承载，
#   dev-01 不单独建 Peer；应用访问 Hub 走同机 WG 接口。
#
# 【Inventory 对应】
#   ansible/inventories/dev/hosts.yml → dev_app → dev-01
#   network.yml → dev_hosts.dev-01
#
# =============================================================================

schema_version: "1"
updated_at: "2026-06-30"
updated_by: "infra-ops"

host:
  name: dev-01
  role: dev_app
  env: dev
  description: "主应用 Web/API + Compose 业务网关（与 ci-01 同 ECS）"

  colocated_with: ci-01

  cloud:
    provider: aliyun
    region: cn-hangzhou
    instance_id: "i-bp14czvx1exdi6zmrt2r"
    instance_type: "ecs.s6-c1m2.2xlarge"
    console_name: "yax"
    vpc_id: "vpc-bp1jmugctnhj97dbjyx31"
    vswitch_id: "vsw-bp1th8ab5itjji9me684i"
    zone: "杭州 可用区 K"

  network:
    public_ip: "121.41.58.20"
    private_ip: "172.21.226.38"
    eip_bound: true
    bandwidth_mbps: 5
    planned_wg_ip: "10.200.1.1"
    wireguard_note: "Hub Peer 使用 ci-01 地址 10.200.0.2；本机 planned_wg_ip 保留作 Dev 段规划"
    hostname: null
    ci_same_vpc: true
    ci_access_from: private
    api_domain: backend.yizuxing.com
    api_domain_legacy: backend.jxqydw.com
    api_domain_legacy_status: blocked_icp
    device_management_public_path: https://backend.yizuxing.com/device-management/

  security_groups:
    bootstrap:
      - id: "sg-bp122tjy3h95um8kv4f9"
        name: sg-dev-ecs-bootstrap
        attached_at: "2026-06-08"
        phase: bootstrap
        note: "含 IN-HTTP/HTTPS-WG、IN-HTTP/HTTPS-PUBLIC-DEV、IN-MQTT-TLS-PUBLIC-DEV(8883)；8080/1883 不对公网"
    target:
      - id: null
        name: sg-dev-ecs-wg
        phase: wireguard

  ram_role:
    name: Dev-ECS-Role
    attached: true
    attached_at: "2026-06-22"
    policy: DevOssInfraDevFileStorageOnly

  dependencies:
    rds:
      instance: rm-bp1wjjf373l7t331v
      endpoint_internal: rm-bp1wjjf373l7t331v.mysql.rds.aliyuncs.com
      endpoint_public: rm-bp1wjjf373l7t331vno.mysql.rds.aliyuncs.com
      endpoint_application: internal
      private_ip_resolved: "172.20.211.167"
      database: app_dev
      user: app_dev
      charset: utf8mb4
      engine_version: "8.0.28"
      whitelist_group: dev-ecs
      whitelist_ip: "172.21.226.38/32"
      whitelist_status: confirmed
      status: operational
      accepted_at: "2026-06-15"
      prod_isolation_verified: true
      acceptance_ref: docs/acceptance/20260615-阶段G-Dev-RDS-app_dev验收.md
    redis:
      instance_id: r-bp10kgwdml4kqgssoz
      console_name: "20260622-183920"
      endpoint_internal: r-bp10kgwdml4kqgssoz.redis.rds.aliyuncs.com
      endpoint_application: internal
      port: 6379
      private_ip_resolved: "172.23.160.90"
      user: petintelli_app
      database: 0
      key_prefix: "petintelli:app:"
      engine_version: "7.0.15"
      architecture: standard
      product: community
      whitelist_group: dev-ecs
      whitelist_ip: "172.21.226.38/32"
      whitelist_status: confirmed
      deployment_note: "云托管 Redis；替代原 dev-02 Docker Redis 规划"
      status: operational
      accepted_at: "2026-06-22"
      acceptance_ref: docs/acceptance/20260622-阶段I-Dev-Redis验收.md
    oss:
      dev_bucket:
        name: infra-dev-file-storage
        resource_group: InfraDevOss
        resource_group_id: rg-aek6bz2zppab7gq
        endpoint_internal: oss-cn-hangzhou-internal.aliyuncs.com
        ram_policy: DevOssInfraDevFileStorageOnly
        object_key_note: "桶级 Dev 隔离；smoke 前缀 smoke-test/；应用键如 uploads/（无需 dev/ 前缀）"
      prod_isolation:
        bucket: yzx-file-storage
        list_denied: true
        put_denied: true
        verified_at: "2026-06-22"
      legacy_planned:
        - name: taoyouxiangzu
          note: "子项目桶；控制台待确认；Dev 策略显式 Deny"
      status: operational
      accepted_at: "2026-06-22"
      acceptance_ref: docs/acceptance/20260622-阶段H-Dev-OSS验收.md
      smoke_command: make oss-smoke

  access_whitelist:
    ci_public_ip: "121.41.58.20/32"
    ci_public_ip_legacy: "47.98.161.33/32"
    ci_public_ip_legacy_status: retired
    office_egress_ips:
      - "115.195.216.251/32"
    note: "禁止 0.0.0.0/0 入站 SSH"

  lifecycle:
    os: Debian 12
    reset_at: "2026-06-08"
    bootstrap_status: ssh_done
    bootstrap_completed_at: "2026-06-14"
    ssh_phase: steady
    ssh_keys_configured: true
    jumpserver_asset_status: onboarded
    jumpserver_asset_onboarded_at: "2026-06-18"
    baota_installed: false

  wireguard:
    status: operational_via_ci_01
    hub_peer: ci-01
    hub_peer_wg_ip: "10.200.0.2"
    acceptance_ref: docs/acceptance/20260614-阶段F-WireGuard验收报告.md

  rds_dev:
    status: operational
    database: app_dev
    acceptance_ref: docs/acceptance/20260615-阶段G-Dev-RDS-app_dev验收.md

  redis_dev:
    status: operational
    instance_id: r-bp10kgwdml4kqgssoz
    user: petintelli_app
    database: 0
    acceptance_ref: docs/acceptance/20260622-阶段I-Dev-Redis验收.md

  oss_dev:
    status: operational
    bucket: infra-dev-file-storage
    ram_role: Dev-ECS-Role
    acceptance_ref: docs/acceptance/20260622-阶段H-Dev-OSS验收.md

  app:
    enabled: true
    deploy_status: operational
    container_name: petintelli-backend
    image: deploy-backend
    listen: "127.0.0.1:8080"
    compose_dir: /opt/app/compose
    operational_at: "2026-06-17"
    health_paths:
      liveness: /healthz
      readiness: /readyz
    note: "占位 dev-app-placeholder 已停用；PetIntelli FastAPI"
    acceptance_ref: docs/acceptance/20260617-阶段4-Dev-Gateway-Compose-LE验收.md

  nginx_app:
    status: operational
    runtime: compose
    gateway_mode: app
    superseded_runtime: host
    domains:
      internal: dev-app.internal
      public: backend.yizuxing.com
      public_legacy: backend.jxqydw.com
      mqtt_tls: mqtt.yizuxing.com
      public_ip: "121.41.58.20"
      wg_access_ip: "10.200.0.2"
    listen:
      http: 80
      https: 443
      mqtt_tls: 8883
    upstream: "127.0.0.1:8080"
    additional_routes:
      device_management:
        prefix: /device-management
        upstream: "127.0.0.1:18080"
        frontend_host_dir: /home/deploy/device-management-system/frontend
        frontend_web_root: /srv/www
        public_url: https://backend.yizuxing.com/device-management/
        internal_url: http://dev-app.internal/device-management/
        healthz: /device-management/healthz
        readyz: /device-management/readyz
        api_prefix: /device-management/api/
        operational_at: "2026-06-30"
    health_uri: /health
    api_health_uri: /healthz
    ssl: letsencrypt_dns01
    ssl_issuer: "Let's Encrypt (YE2)"
    ssl_expires: "2026-09-20"
    operational_at: "2026-06-17"
    domain_migrated_at: "2026-06-22"
    mqtt_tls_operational_at: "2026-06-22"
    playbooks:
      - ansible/playbooks/gateway-compose.yml
    runbook: docs/docker/dev-gateway.runbook.md
    acceptance_ref: docs/acceptance/20260622-阶段J-Dev-MQTT-MQTTS与域名迁移验收.md
    device_management_acceptance_ref: docs/acceptance/20260630-Dev-Gateway-device-management路径隔离验收.md
    legacy:
      runtime: host
      playbooks:
        - ansible/playbooks/nginx-dev.yml
      acceptance_ref: docs/acceptance/20260616-阶段3-Dev业务Nginx与占位API验收.md
      ssl: self_signed_dev

  gateway_compose:
    status: operational
    project_name: dev-gateway
    project_dir_manual: ~/infra-ops/docker/dev-gateway
    project_dir_ansible: /opt/gateway/compose
    images_namespace: infra-ops
    images_tag: "1.0.3"
    images_delivery: local
    certbot_challenge: dns-01
    primary_domain: backend.yizuxing.com
    certbot_domains: "backend.yizuxing.com mqtt.yizuxing.com"
    nginx_network_mode: host
    device_management:
      service_prefix: /device-management
      upstream: "127.0.0.1:18080"
      frontend_host_dir: /home/deploy/device-management-system/frontend
      public_url: https://backend.yizuxing.com/device-management/
      internal_url: http://dev-app.internal/device-management/
      operational_at: "2026-06-30"
    mqtt:
      enabled: true
      route: A
      tls_domain: mqtt.yizuxing.com
      tls_port: 8883
      upstream: "127.0.0.1:1883"
      plain_port_not_public: 1883
      operational_at: "2026-06-22"
    docker_network:
      certbot_internal_subnet: "172.30.0.0/24"
      reserved_vpc_subnets:
        - "172.20.0.0/16"
        - "172.21.0.0/16"
    volumes:
      - dev-gateway-letsencrypt
      - dev-gateway-certbot-renew-state
      - dev-gateway-nginx-logs
    playbooks:
      - ansible/playbooks/gateway-compose.yml
    runbook: docs/docker/dev-gateway.runbook.md
    acceptance_ref: docs/acceptance/20260622-阶段J-Dev-MQTT-MQTTS与域名迁移验收.md

  wechat_miniprogram:
    request_domain: backend.yizuxing.com
    request_domain_legacy: backend.jxqydw.com
    tls_requirement: "受信 CA（LE）；须配置公众平台合法域名"
    verified_at: "2026-06-22"
  ansible:
    inventory: ansible/inventories/dev/
    inventory_user: deploy
    ci_deploy_key: infra-ci-deploy

  # 阶段 G5 Dev JumpServer 资产纳管（2026-06-18，ci-01 控制机）
  jumpserver_asset:
    status: onboarded
    onboarded_at: "2026-06-18"
    control_host: ci-01
    playbook: ansible/playbooks/jumpserver-asset-prep.yml
    console:
      asset_name: CI-DEV-01
      inventory_name: Dev-01
      node: Dev/ECS
      address: "10.200.0.2"
      address_fallback: "172.21.226.38"
      account_template: linux-jump-ops
      linux_user: jump_ops
    ansible_prep:
      command: "make jumpserver-asset-prep JUMPSERVER_ASSET_LIMIT=dev-01"
      verify_script: scripts/mgmt/verify-jumpserver-asset-remote.sh
      checks:
        jump_ops_shell_bash: ok
        allow_users_jump_ops: ok
        ssh_dir_mode_700: ok
        sudoers_jump_ops: ok
        verify_jumpserver_asset_remote: ok
    jms:
      account_push_replay: skipped_no_pending_account
      web_terminal: ok
      web_terminal_at: "2026-06-18"
      note: "推送密钥在 asset-prep 前已写入；prep 后 Console 即成功"
    pending:
      - remove_deploy_account_from_jms_if_present
      - platform_authorization_mfa
    acceptance_ref: docs/acceptance/20260618-阶段G5-JumpServer资产纳管-Dev验收.md
    acceptance_log: logs/console-acceptance.log
