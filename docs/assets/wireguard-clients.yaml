#   4. ./scripts/wireguard/render-laptop-conf.sh <peer_name> → 安全渠道交付同事
#
# 【来源】
#   logs/remark.log（人员名单）
#   logs/console-acceptance.log（2026-06-16 F6 验收）
#
# =============================================================================

