# =============================================================================
# WireGuard 人员 Client 台账（client_pool 10.200.10.0/24）
# =============================================================================
#
# 【用途】
#   记录每位同事的 Peer 名、WG 地址、角色与 Client AllowedIPs。
#   与 ansible/inventories/mgmt/group_vars/all/wireguard.yml 中
#   wireguard_peers_planned（laptop-*）保持同步。
#
# 【密钥流程】
#   1. ./scripts/wireguard/wg-keys.sh generate-peer <peer_name>
#   2. ./scripts/wireguard/wg-keys.sh sync-inventory
#   3. ansible-playbook ansible/playbooks/wireguard-hub.yml -i ansible/inventories/mgmt/ --limit hub-01
#   4. ./scripts/wireguard/render-laptop-conf.sh <peer_name> → 安全渠道交付同事
#
# 【来源】
#   logs/remark.log（2026-06-17）
#
# =============================================================================

