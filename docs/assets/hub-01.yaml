    completed_at: "2026-06-14"
    peer: ci-01
    peer_wg_ip: "10.200.0.2"
    peer_endpoint: "121.41.58.20"
    checks:
      ci_wg_handshake: ok
      ci_ping_hub_wg: ok
      ci_ssh_hub_via_wg: ok
      hub_sees_ci_endpoint: ok
      route_10_200_0_0_16: ok

  # 阶段 F2-5 Ansible 经 WG 收口（2026-06-14，ci-01 logs/console-check.log）
  stage_f2_5:
    completed_at: "2026-06-14"
    verified_at: "2026-06-14"
    control_host: ci-01
    acceptance_log: logs/console-check.log
    ci_connectivity_access_mode: wireguard
    network_phase: wireguard
    hub_ansible_host: "10.200.0.1"
    script: scripts/mgmt/stage-f2-5-followup.sh
    checks:
      access_mode_wireguard: ok
      hub_ansible_host_10_200_0_1: ok
      ansible_ping_from_ci_01: ok
    note: "steady 阶段再评估关公网 SSH / JumpServer"

  # 阶段 F3 自动化验收（2026-06-14，ci-01 logs/console-acceptance.log）
  stage_f3_acceptance:
    completed_at: "2026-06-14"
    control_host: ci-01
    acceptance_log: logs/console-acceptance.log
    prior_logs:
