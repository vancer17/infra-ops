# =============================================================================
# Hub-01 资产台账 — 临时管理 Hub / WireGuard Server
# =============================================================================
#
# 【角色说明】
#   企业原方案：47.97.19.58（宝塔）作为 Hub，运行 WG Server、JumpServer、监控入口。
#   当前现实：该机器不可用；本台 launch-advisor-20241121 临时承担 Hub 角色。
#
# 【本期职责】
#   - 最小 WireGuard 组网的唯一 Server（UDP 51820，地址 10.200.0.1）
#   - 后续：JumpServer 堡垒机、可选 dnsmasq 内网 DNS
#
# 【Ansible Inventory】
#   inventories/dev/ 仅含 dev-01、dev-02
#   inventories/mgmt/ 含 hub-01（本机）— 见 ansible/inventories/mgmt/README.md
#
# 【维护规则】
#   原 Hub 恢复后：更新 registry.yaml replacements，迁移 WG 配置，勿直接删除本文件历史。
#
#   阶段 F1（2026-06-14）：wireguard-hub.yml apply 完成 → wireguard_status: server_up
#   阶段 F2（2026-06-14）：wireguard-peer.yml on ci-01 + 握手验收 → operational
#
# =============================================================================

schema_version: "1"
updated_at: "2026-06-14"
updated_by: "infra-ops"

host:
  name: hub-01
  role: hub
  env: mgmt
  description: "临时 Hub — WireGuard Server +（规划）JumpServer"

  # --- 替代关系 ---
  replacement:
    replaces_planned_host: "47.97.19.58"
    temporary: true
    until: "原 Hub 恢复或采购专用管理机"

  # --- 阿里云 ECS ---
  cloud:
    provider: aliyun
    region: cn-hangzhou
    instance_id: "i-bp13u0d90uicmwrh4kb"
    instance_type: "ecs.g6.xlarge"
    console_name: "launch-advisor-20241121"
    vpc_id: "vpc-bp1jmugctnhj97dbjyx31"
    vswitch_id: "vsw-bp17r7fqjqzeb2lqbyque"
    zone: "杭州 可用区 I"

  # --- 网络地址 ---
  network:
    public_ip: "121.43.49.58"
    private_ip: "172.21.127.123"
    eip_bound: true
    bandwidth_mbps: 2
    bandwidth_note: "控制面/WG 握手足够；经 Hub 转发大流量为二期升配"
    # wg0 已 operational（F1/F2）；与 registry.yaml wireguard_plan 一致
    planned_wg_ip: "10.200.0.1"
    wg_listen_port: 51820
    hostname: "iZbp13i3ed90ieamwrb4kbZ"
    ci_same_vpc: true
    # Ansible mgmt 经 WG 10.200.0.1（F2-5）；人工 SSH 仍可用 VPC 私网
    ci_access_from: private
    ansible_hub_via: wireguard

  # --- 安全组（控制台创建后填入 id；规则见 docs/security-groups/hub-bootstrap.rules.yaml）---
  security_groups:
    bootstrap:
      - id: sg-bp122tjy3h95um8kv4f9
        name: sg-dev-ecs-bootstrap
        phase: bootstrap
        rules_file: docs/security-groups/dev-ecs-bootstrap.rules.yaml
        note: "与 Dev 共用 id；UDP 51820 见 dev-ecs-bootstrap IN-WG-*；阶段 F 前须在控制台确认已添加"
    target:
      - id: null
        name: "sg-hub-wg"
        phase: wireguard
        note: "目标态：Hub 独立安全组，避免 Dev 实例继承 UDP 51820 入站"

  ram_role:
    name: null
    attached: false
    note: "Hub 通常不需 OSS 写权限；JumpServer 可用 AK 或 RAM 按最小权限"

  access_whitelist:
    ci_public_ip: "121.41.58.20/32"
    office_egress_ips:
      - "115.195.216.251/32"
    wireguard_future: "10.200.0.0/16"

  ansible:
    inventory: ansible/inventories/mgmt/
    inventory_user: deploy
    ssh_phase: steady
    ssh_keys_configured: true
    ci_deploy_key: infra-ci-deploy
    github_secrets_configured:
      - ANSIBLE_SSH_PRIVATE_KEY
      - ANSIBLE_SSH_KNOWN_HOSTS
    github_secrets_required_stage_f:
      - ANSIBLE_VAULT_PASSWORD
    github_secrets_note: "VAULT 与 ci-01 .vault_pass 一致；供 deploy.yml 解密 wireguard_vault.yml"

  lifecycle:
    os: "Debian 12"
    reset_at: null
    bootstrap_status: ssh_done
    bootstrap_completed_at: "2026-06-14"
    bootstrap_control_host: ci-01
    wireguard_status: operational
    wireguard_keys_ready_at: "2026-06-14"
    wireguard_server_status: installed
    wireguard_server_installed_at: "2026-06-14"
    jumpserver_status: not_planned
    baota_installed: false

  # 阶段 E 密钥验收（2026-06-14，ci-01 上 wg-keys all-hub + vault-encrypt-hub）
  wireguard_keys:
    completed_at: "2026-06-14"
    hub_public_key_file: ansible/keys/wireguard/hub.pub
    vault_file: ansible/inventories/mgmt/group_vars/all/wireguard_vault.yml
    peer_model: single_peer_ci_01
    checks:
      verify_hub: ok
      verify_peer_ci_01: ok
      vault_encrypted: ok
      gitleaks: ok
    pending_stage_f: []
    completed_stage_f1:
      - hub_install_wireguard_package
      - hub_ip_forward
      - hub_wg0_listen_51820
      - console_udp_51820_verified

  # 阶段 F1 Hub Server 验收（2026-06-14，ci-01 wireguard-hub.yml apply + SSH 复核）
  wireguard_server:
    completed_at: "2026-06-14"
    playbook: ansible/playbooks/wireguard-hub.yml
    control_host: ci-01
    interface: wg0
    address: "10.200.0.1/24"
    listen_udp: 51820
    ip_forward: 1
    hub_active_peers: [ci-01, developer-laptop]
    checks:
      ansible_apply: ok
      wg_show: ok
      udp_51820_listen: ok
      wg0_address: ok
      ci_01_handshake: ok
    completed_stage_f2:
      - wireguard_peer_ci_01
      - handshake_ci_01
      - wireguard_status_operational

  # 阶段 F2 Hub↔CI 握手验收（2026-06-14，ci-01 console-acceptance.log）
  wireguard_peer_ci_01:
    completed_at: "2026-06-14"
    peer: ci-01
    peer_wg_ip: "10.200.0.2"
    peer_endpoint: "121.41.58.20"
    checks:
      ci_wg_handshake: ok
      ci_ping_hub_wg: ok
      ci_ssh_hub_via_wg: ok
      hub_sees_ci_endpoint: ok
      route_10_200_0_0_16: ok

  # 阶段 F2-5 Ansible 经 WG 收口（2026-06-14，ci-01 logs/console-check.log）
  stage_f2_5:
    completed_at: "2026-06-14"
    verified_at: "2026-06-14"
    control_host: ci-01
    acceptance_log: logs/console-check.log
    ci_connectivity_access_mode: wireguard
    network_phase: wireguard
    hub_ansible_host: "10.200.0.1"
    script: scripts/mgmt/stage-f2-5-followup.sh
    checks:
      access_mode_wireguard: ok
      hub_ansible_host_10_200_0_1: ok
      ansible_ping_from_ci_01: ok
    note: "steady 阶段再评估关公网 SSH / JumpServer"

  # 阶段 C 远程验收记录（2026-06-14，控制机 ci-01 deploy@172.21.226.38）
  # 注：F2-5 后 Ansible 连 Hub 改经 10.200.0.1；本段保留 C 阶段 VPC 私网验收历史
  verification:
    completed_at: "2026-06-14"
    method: "ssh deploy@172.21.127.123 + infra-ci-deploy"
    superseded_for_ansible_by: "stage_f2_5.hub_ansible_host"
    checks:
      deploy_user: ok
      jump_ops_user: ok
      timezone: "Asia/Shanghai"
      opt_mgmt: ok
      opt_wireguard: "exists (mode 0750 root; deploy 无 list 权限为预期)"
      var_log_mgmt: ok
      docker_installed: false
    note: "ping 私网/公网可能丢包（ICMP 禁）；以 SSH/nc 为准"
