# =============================================================================
# CI-01 资产台账 — 临时 CI / Ansible 控制机 / GitHub Runner 宿主机
# =============================================================================
#
# 【角色说明】
#   企业原方案：47.98.161.33 作为 CI 机，运行 Self-hosted Runner，经 WG 部署各环境。
#   当前现实：原 CI 不可用；本台与 dev-01 **同一台 ECS**（控制台名 yax）。
#
# 【同机多角色注意】
#   - 公网 IP、私网 IP、实例 ID 与 dev-01.yaml 完全相同
#   - CI 职责：ansible-playbook、GitHub Actions Runner、后续镜像构建
#   - Dev-01 职责：应用运行时（Docker、Nginx 等）
#   - WireGuard：阶段 F **已完成** — 仅 ci-01 作为 Hub Peer（10.200.0.2，operational）；
#     阶段 G2（2026-06-16）：WG Client DNS=10.200.0.1 — 见 stage_g2_wg_client_dns
#     dev-01 不单独 Peer，见 wireguard_peer_model: single_peer_ci_01
#
# 【与 security_whitelist 的关系】
#   network.yml / 安全组中的 ci_public_ip 现为 121.41.58.20（本机公网），
#   不再是已退役的 47.98.161.33。
#
# =============================================================================

schema_version: "1"
updated_at: "2026-06-18"
updated_by: "infra-ops"

host:
  name: ci-01
  role: ci
  env: mgmt
  description: "临时 CI — Ansible 控制机 + GitHub Self-hosted Runner"

  replacement:
    replaces_planned_host: "47.98.161.33"
    temporary: true
    colocated_with: dev-01
    same_instance_id: "i-bp14czvx1exdi6cmrt2r"

  cloud:
    provider: aliyun
    region: cn-hangzhou
    instance_id: "i-bp14czvx1exdi6cmrt2r"
    instance_type: "ecs.s6-c1m2.2xlarge"
    console_name: "yax"
    vpc_id: "vpc-bp1jmugctnhj97dbjyx31"
    vswitch_id: "vsw-bp1th8ab5itjji9me684i"
    zone: "杭州 可用区 K"

  network:
    public_ip: "121.41.58.20"
    private_ip: "172.21.226.38"
    eip_bound: true
    bandwidth_mbps: 5
    planned_wg_ip: "10.200.0.2"
    hostname: null
    # 与 Dev 同 VPC（vpc-bp1jmugctnhj97dbjyx31），Ansible 访问 dev-02 可用私网 172.21.127.x
    ci_same_vpc: true
    ci_access_mode: wireguard

  security_groups:
    bootstrap:
      - id: "sg-bp122tjy3h95um8kv4f9"
        name: "sg-dev-ecs-bootstrap"
        phase: bootstrap
        note: "与 dev-01 共用；本机既是 CI 来源也是 Dev 目标"

  ram_role:
    name: "Dev-ECS-Role"
    attached: false
    note: "若绑定在实例上，则 CI 与 Dev 共享同一 RAM 角色"

  github_runner:
    planned: true
    labels: [self-hosted, dev, aliyun]
    status: not_registered
    note: "F2-5 后 Ansible 经 WG 连 Hub；Runner 见 register-github-runner.sh"

  github_secrets:
    configured:
      - ANSIBLE_SSH_PRIVATE_KEY
      - ANSIBLE_SSH_KNOWN_HOSTS
      - ANSIBLE_VAULT_PASSWORD
    required_before_stage_f_deploy: []
    environment: dev
    note: "ANSIBLE_VAULT_PASSWORD 与 ci-01 .vault_pass 一致；deploy.yml 解密 wireguard_vault.yml"

  ssh_deploy_key:
    comment: "infra-ci-deploy@121.41.58.20"
    pubkey_path: "ansible/keys/infra-ci-deploy.pub"
    github_secret: ANSIBLE_SSH_PRIVATE_KEY

  lifecycle:
    os: "Debian 12"
    bootstrap_status: ssh_done
    bootstrap_completed_at: "2026-06-14"
    ssh_phase: steady
    ssh_keys_configured: true
    wireguard_status: operational
    wireguard_keys_ready_at: "2026-06-14"
    wireguard_client_installed_at: "2026-06-14"
    network_phase_wireguard_at: "2026-06-14"
    ansible_hub_via_wg_at: "2026-06-14"
    runner_status: not_registered

  control_plane:
    setup_script: scripts/dev/setup-control-plane-env.sh
    ansible_private_key: ansible/keys/infra-ci-deploy
    vault_password_file: .vault_pass
    git_identity_note: "ci-01 上 commit 前须配置 git user.name / user.email（deploy 用户）"
    note: "阶段 E 密钥 + GitHub ANSIBLE_VAULT_PASSWORD（dev Environment）已配置"

  # GitHub ANSIBLE_VAULT_PASSWORD 验收（2026-06-14，logs/console-acceptance.log §wireguard-hub dry-run）
  github_vault_password:
    completed_at: "2026-06-14"
    github_environment: dev
    secret_name: ANSIBLE_VAULT_PASSWORD
    local_file: .vault_pass
    vault_encrypted_file: ansible/inventories/mgmt/group_vars/all/wireguard_vault.yml
    deploy_workflow: .github/workflows/deploy.yml
    checks:
      local_vault_view: ok
      github_secret_configured: ok
      wireguard_hub_playbook_check_diff: ok
    verification_command: |
      ansible-playbook ansible/playbooks/wireguard-hub.yml \
        -i ansible/inventories/mgmt/ --limit hub-01 \
        --vault-password-file .vault_pass --check --diff
    verification_result: "PLAY RECAP hub-01 ok=15 changed=0 failed=0"
    pending: github_runner_registration_for_deploy_yml

  # 阶段 F2 ci-01 WireGuard Client 验收（2026-06-14，wireguard-peer.yml + console-acceptance.log）
  wireguard_client:
    completed_at: "2026-06-14"
    playbook: ansible/playbooks/wireguard-peer.yml
    peer_name: ci-01
    interface: wg0
    address: "10.200.0.2/32"
    hub_wg_ip: "10.200.0.1"
    hub_endpoint: "121.43.49.58:51820"
    limited_sudo: deploy-wireguard
    checks:
      ansible_apply: ok
      wg_handshake: ok
      ping_hub_wg: ok
      ssh_hub_via_wg: ok

  # 阶段 G2 ci-01 WG Client DNS（2026-06-16，hub-g2.yml + wireguard-peer.yml + console-acceptance.log）
  stage_g2_wg_client_dns:
    completed_at: "2026-06-16"
    acceptance_log: logs/console-acceptance.log
    wg_client_dns: "10.200.0.1"
    checks:
      wg0_conf_dns_line: ok
      dig_jms_via_hub_dns: ok
      curl_jms_status_json: ok
      curl_jms_root_503: ok

  # 阶段 F2-5 Ansible 经 WG 收口（2026-06-14，logs/console-check.log）
  stage_f2_5:
    completed_at: "2026-06-14"
    verified_at: "2026-06-14"
    control_host: ci-01
    acceptance_log: logs/console-check.log
    script: scripts/mgmt/stage-f2-5-followup.sh
    inventory:
      ci_connectivity_access_mode: wireguard
      network_phase: wireguard
      hub_ansible_host: "10.200.0.1"
    checks:
      wireguard_status_operational: ok
      access_mode_wireguard: ok
      hub_ansible_host_10_200_0_1: ok
      ansible_ping_hub_via_wg: ok
    optional:
      github_runner: not_registered
      laptop_peers_ledger: docs/assets/wireguard-clients.yaml
      laptop_peer_ops_doc: docs/wireguard/developer-laptop-client.md

  # 阶段 F3 自动化验收（2026-06-14，与 hub-01 stage_f3_acceptance 同步）
  stage_f3_acceptance:
    completed_at: "2026-06-14"
    control_host: ci-01
    acceptance_log: logs/console-acceptance.log
    script: scripts/mgmt/stage-f-preflight.sh
    checks:
      inventory_mgmt: ok
      wg_keys_verify: ok
      deploy_wireguard_sudo: ok
      vault_view: ok
      secret_scan: ok
      stage_f_preflight: ok
      github_ansible_vault_password: ok
      wireguard_hub_check_diff: ok
    conclusion: "阶段 F 最小组网验收通过；GitHub VAULT 已配；Runner 注册为 deploy.yml 可选后续"

  # JumpServer：本机与 dev-01 同 ECS；堡垒机纳管在 dev-01 资产（CI-DEV-01 @ 10.200.0.2），勿建 ci-01 重复条目
  jumpserver:
    asset_host: dev-01
    console_asset_name: CI-DEV-01
    onboarded_at: "2026-06-18"
    acceptance_ref: docs/acceptance/20260618-阶段G5-JumpServer资产纳管-Dev验收.md
    note: "CI/Ansible 使用 deploy；deploy 不录入 JumpServer"
