shared_cloud_dependencies:
  rds:
    instance_id: "rm-bp1wjjf373l7t331vno"
    endpoint: "rm-bp1wjjf373l7t331vno.mysql.rds.aliyuncs.com"
    port: 3306
    dev_database: app_dev
    dev_user: app_dev
    whitelist_group: dev-ecs
  oss:
    - bucket: yzx-file-storage
      dev_prefix: "dev/"
    - bucket: taoyouxiangzu
      dev_prefix: "dev/"

