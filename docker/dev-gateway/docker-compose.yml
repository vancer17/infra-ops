# =============================================================================
# Dev 业务网关 Compose — Nginx + Certbot (DNS-01)
# =============================================================================
#
# 镜像在控制机/CI 预构建；本地 tag 为 infra-ops/*（非轩辕加速站私有仓库）
# 本地构建：仓库根 make build-gateway-images / scripts/docker/build-gateway-images.sh
#
# 启动顺序：
#   1. certbot-init   — 一次性 DNS-01 签发（成功 exit 0）
#   2. certbot-renew  — 确认证书有效后 healthcheck=healthy，进入续期循环
#   3. nginx          — 依赖 certbot-renew healthy 后启动（避免无证书启动）
#
# 迁移前（dev-01 宿主机）须停用 systemd Nginx，释放 80/443：
#   sudo systemctl disable --now nginx
#
# 部署目录（与 Ansible gateway.compose.project_dir 一致）：
#   /opt/gateway/compose
#
# 快速开始（目标机，delivery=local 且已 build 后）：
#   cp .env.example .env
#   docker compose up -d
#
# =============================================================================

name: dev-gateway

services:
  certbot-init:
    container_name: dev-gateway-certbot-init
    image: ${GATEWAY_IMAGE_CERTBOT_INIT}
    restart: "no"
    env_file:
      - .env
    environment:
      LETSENCRYPT_DIR: /etc/letsencrypt
      CERTBOT_FORCE_ISSUE: ${CERTBOT_FORCE_ISSUE:-0}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      CERTBOT_DNS_PROPAGATION_SECONDS: ${CERTBOT_DNS_PROPAGATION_SECONDS:-90}
      CERTBOT_RSA_KEY_SIZE: ${CERTBOT_RSA_KEY_SIZE:-4096}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-renew-state:/var/run/certbot-renew
    networks:
      - certbot-internal

  certbot-renew:
    container_name: dev-gateway-certbot-renew
    image: ${GATEWAY_IMAGE_CERTBOT_RENEW}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LETSENCRYPT_DIR: /etc/letsencrypt
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS}
      CERTBOT_PRIMARY_DOMAIN: ${CERTBOT_PRIMARY_DOMAIN}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      CERTBOT_DNS_PROPAGATION_SECONDS: ${CERTBOT_DNS_PROPAGATION_SECONDS:-90}
      RENEW_INTERVAL_SECONDS: ${RENEW_INTERVAL_SECONDS:-43200}
      WAIT_FOR_CERT_SEC: ${WAIT_FOR_CERT_SEC:-900}
      CERTBOT_READY_FILE: /var/run/certbot-renew/ready
      NGINX_CONTAINER_NAME: dev-gateway-nginx
      CERTBOT_DEPLOY_HOOK: /usr/local/bin/reload-nginx.sh
      ALIYUN_DNS_ACCESS_KEY: ${ALIYUN_DNS_ACCESS_KEY}
      ALIYUN_DNS_ACCESS_KEY_SECRET: ${ALIYUN_DNS_ACCESS_KEY_SECRET}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-renew-state:/var/run/certbot-renew
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      certbot-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /var/run/certbot-renew/ready && openssl x509 -checkend 86400 -noout -in /etc/letsencrypt/live/$${CERTBOT_PRIMARY_DOMAIN}/fullchain.pem",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - certbot-internal

  nginx:
    container_name: dev-gateway-nginx
    image: ${GATEWAY_IMAGE_NGINX}
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      CERTBOT_PRIMARY_DOMAIN: ${CERTBOT_PRIMARY_DOMAIN}
      NGINX_SERVER_NAMES: ${NGINX_SERVER_NAMES}
      NGINX_INTERNAL_SERVER_NAMES: ${NGINX_INTERNAL_SERVER_NAMES:-}
      APP_UPSTREAM_HOST: ${APP_UPSTREAM_HOST:-127.0.0.1}
      APP_UPSTREAM_PORT: ${APP_UPSTREAM_PORT:-8080}
      NGINX_MQTT_TLS_ENABLED: ${NGINX_MQTT_TLS_ENABLED:-0}
      MQTT_TLS_DOMAIN: ${MQTT_TLS_DOMAIN:-}
      MQTT_TLS_PORT: ${MQTT_TLS_PORT:-8883}
      MQTT_TLS_CERT_DOMAIN: ${MQTT_TLS_CERT_DOMAIN:-}
      MQTT_UPSTREAM_HOST: ${MQTT_UPSTREAM_HOST:-127.0.0.1}
      MQTT_UPSTREAM_PORT: ${MQTT_UPSTREAM_PORT:-1883}
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      certbot-renew:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  letsencrypt:
    name: dev-gateway-letsencrypt
  certbot-renew-state:
    name: dev-gateway-certbot-renew-state
  nginx-logs:
    name: dev-gateway-nginx-logs

networks:
  # 必须显式指定子网，避免 Docker 默认池分配到 172.20.0.0/16 与 VPC 内 RDS（172.20.x）冲突
  certbot-internal:
    name: dev-gateway-certbot-internal
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
