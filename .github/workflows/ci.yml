# =============================================================================
# GitHub Actions Workflow: CI（静态质量门禁）
# =============================================================================
#
# 【这个文件是什么】
#   infra-ops 仓库的 Pull Request / push 静态检查流水线。
#   目标：在合并前拦截 YAML 格式错误、Shell/Ansible 规范问题、Playbook
#   语法错误、Compose 配置错误、误提交的密钥等。
#
# 【设计原则：单一事实来源（Single Source of Truth）】
#   各 job 的「检查逻辑」不在本文件内联 shell，而是调用 scripts/ci/*.sh。
#   本地开发者通过 Makefile（make ci / make lint …）调用同一套脚本，
#   避免「本地命令与 CI 命令不一致」导致的维护漂移。
#
# 【与仓库其它入口的对应关系】
#   ┌─────────────────────┬──────────────────────────────────────────────┐
#   │ 入口                │ 说明                                         │
#   ├─────────────────────┼──────────────────────────────────────────────┤
#   │ make ci             │ scripts/ci/run-all.sh（本 workflow 前 6 job）│
#   │ make lint           │ yamllint + shellcheck + ansible-lint         │
#   │ make syntax         │ ansible-syntax.sh                            │
#   │ make inventory      │ inventory-check.sh（本地专用，未纳入 CI job）│
#   │ make setup          │ install-deps.sh all                          │
#   │ ci-gate（本文件）   │ 分支保护统一检查项；需全部 job 绿才通过      │
#   └─────────────────────┴──────────────────────────────────────────────┘
#
# 【Job 与脚本映射】
#   yaml-lint       → install-deps.sh yamllint      → yamllint.sh
#   shellcheck      → （ubuntu-latest 预装 shellcheck）→ shellcheck.sh
#   ansible-lint    → install-deps.sh ansible-lint  → ansible-lint.sh
#   ansible-syntax  → install-deps.sh ansible       → ansible-syntax.sh
#   docker-validate → （ubuntu-latest 预装 docker）  → docker-validate.sh
#   secret-scan     → install-deps.sh gitleaks      → secret-scan.sh
#   ci-gate         → 汇总上述 job（无脚本，仅 needs 依赖）
#
# 【Python 依赖版本】
#   需要 Python 的 job 在跑检查脚本前先执行 install-deps.sh <profile>。
#   install-deps.sh 从 requirements-dev.txt（uv 锁定）安装工具，与本地 make setup 一致。
#   环境变量 UV_SYSTEM_PYTHON=1 告知 install-deps 写入 setup-python 提供的解释器。
#
# 【为何不用 inventory-check job】
#   inventory-check.sh 供 make inventory 单独调用（改 inventories/dev/ 时）。
#   ansible-syntax.sh 已含轻量 inventory graph 抽查；深度跨 VPC 校验留本地，
#   避免 CI 对 Jinja2 渲染行为差异导致误报。若需纳入 CI，可增 job 并加入 ci-gate needs。
#
# 【实机 Bootstrap 不在此 workflow】
#   SSH / apply / verify 见 scripts/dev/bootstrap.sh 与 deploy.yml（Self-hosted Runner）。
#
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# 同一分支上的新 push 取消进行中的旧 run，节省 Actions 分钟
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  # 与 requirements-dev.txt 编译时 --python-version 保持一致
  PYTHON_VERSION: "3.12"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  # install-deps.sh：GitHub Actions 无 .venv 时，将包安装到 setup-python 的解释器
  UV_SYSTEM_PYTHON: "1"

jobs:
  # ---------------------------------------------------------------------------
  # 1. YAML 格式检查
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/yamllint.sh
  # 依赖：yamllint（install-deps profile: yamllint → sync requirements-dev.txt）
  # 本地：make yamllint
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: bash ./scripts/ci/install-deps.sh yamllint

      - name: Run yamllint
        run: bash ./scripts/ci/yamllint.sh

  # ---------------------------------------------------------------------------
  # 2. Shell 脚本检查
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/shellcheck.sh
  # 依赖：ShellCheck（ubuntu-latest 镜像已预装；本地 Debian 需 apt install shellcheck）
  # 说明：原 ludeeus/action-shellcheck 已替换为同一 shell 脚本，便于与 make shellcheck 对齐
  # 本地：make shellcheck
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run ShellCheck
        run: bash ./scripts/ci/shellcheck.sh

  # ---------------------------------------------------------------------------
  # 3. Ansible Lint（规范与最佳实践）
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/ansible-lint.sh
  # 依赖：install-deps profile ansible-lint → requirements-dev.txt + Galaxy collections
  # 配置：.ansible-lint（扫描 playbooks、roles、inventory vars）
  # 本地：make ansible-lint
  # ---------------------------------------------------------------------------
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: bash ./scripts/ci/install-deps.sh ansible-lint

      - name: Run ansible-lint
        run: bash ./scripts/ci/ansible-lint.sh

  # ---------------------------------------------------------------------------
  # 4. Ansible Playbook 语法检查
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/ansible-syntax.sh
  # 依赖：install-deps profile ansible → requirements-dev.txt + Galaxy collections
  # 内容：site.yml（若有）、playbooks/*.yml --syntax-check；附加 inventory graph 抽查
  # 本地：make ansible-syntax / make syntax
  # ---------------------------------------------------------------------------
  ansible-syntax:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: bash ./scripts/ci/install-deps.sh ansible

      - name: Run syntax check
        run: bash ./scripts/ci/ansible-syntax.sh

  # ---------------------------------------------------------------------------
  # 5. Docker Compose 配置校验
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/docker-validate.sh
  # 依赖：docker compose（ubuntu-latest 已预装；仅 parse，不启动容器）
  # 行为：jumpserver/monitoring compose 文件不存在则 skip（与旧 CI 一致）
  # 本地：make docker-validate
  # ---------------------------------------------------------------------------
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate compose files
        run: bash ./scripts/ci/docker-validate.sh

  # ---------------------------------------------------------------------------
  # 6. 敏感信息扫描
  # ---------------------------------------------------------------------------
  # 脚本：scripts/ci/secret-scan.sh
  # 依赖：install-deps profile gitleaks → 下载到 .ci-tools/bin（脚本内也会 prepend PATH）
  # 注意：fetch-depth: 0 扫描完整 Git 历史；shallow clone 可能漏检旧提交中的密钥
  # 本地：make secret-scan（需 make setup 或系统安装 gitleaks）
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: bash ./scripts/ci/install-deps.sh gitleaks

      - name: Run gitleaks
        run: bash ./scripts/ci/secret-scan.sh

  # ---------------------------------------------------------------------------
  # 7. 汇总门禁（Branch Protection 推荐只勾选此项）
  # ---------------------------------------------------------------------------
  # 作用：将上述 6 个并行 job 合并为一个「必须通过」的检查点。
  # 在 GitHub → Settings → Branches → Branch protection rules 中：
  #   Required status checks → 勾选 "CI Gate"
  # 开发者本地等价：make ci（通过后再 push / 开 PR；远程仍以本 job 为准）
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - yaml-lint
      - shellcheck
      - ansible-lint
      - ansible-syntax
      - docker-validate
      - secret-scan
    steps:
      - name: All checks passed
        run: echo "All CI jobs passed."
